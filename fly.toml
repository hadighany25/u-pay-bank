# fly.toml app configuration file generated for u-pay-bank
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'u-pay-bank'
primary_region = 'sin'

[build]
  # កន្លែងនេះទុកទំនេរធម្មតា

[env]
  PORT = "3000"

# 🔥 បន្ថែមផ្នែកនេះ ដើម្បីប្រាប់ Fly.io ពីទីតាំងពិតប្រាកដរបស់ server.js របស់អ្នក
[processes]
  app = 'node "U-Pay Backend/server.js"'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024