<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <title>Smart Scan AI - U-Pay</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script
      src="https://unpkg.com/html5-qrcode"
      type="text/javascript"
    ></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/lang.js"></script>
    <script src="js/u-pay-core.js"></script>
    <script src="js/toast.js"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Kantumruy+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background-color: #f2f4f6;
        margin: 0;
        font-family: "Kantumruy Pro", "Inter", sans-serif;
        overflow: hidden;
        visibility: hidden;
        opacity: 0;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        transition:
          opacity 0.4s ease,
          background-color 0.3s ease;
        -webkit-font-smoothing: antialiased;
      }
      body.loaded {
        visibility: visible;
        opacity: 1;
      }
      .kh-text {
        font-family: "Kantumruy Pro", "Inter", sans-serif !important;
      }
      .app-container {
        width: 100%;
        max-width: 450px;
        height: 100vh;
        position: relative;
        background: #f8fafc;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        transition: background-color 0.3s;
      }
      #reader {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }
      .scan-header {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 20;
        padding: 25px 20px;
        box-sizing: border-box;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), transparent);
      }
      .back-link {
        color: white;
        font-size: 1.4rem;
        text-decoration: none;
        opacity: 0.9;
        transition: 0.2s;
      }
      .back-link:active {
        opacity: 0.5;
        transform: scale(0.9);
      }
      .scan-overlay-ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .scan-frame {
        width: 270px;
        height: 270px;
        position: relative;
        border-radius: 30px;
        box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .corner {
        position: absolute;
        width: 40px;
        height: 40px;
        border-color: #00b894;
        border-style: solid;
        border-width: 5px;
      }
      .tl {
        top: -3px;
        left: -3px;
        border-right: 0;
        border-bottom: 0;
        border-top-left-radius: 25px;
      }
      .tr {
        top: -3px;
        right: -3px;
        border-left: 0;
        border-bottom: 0;
        border-top-right-radius: 25px;
      }
      .bl {
        bottom: -3px;
        left: -3px;
        border-right: 0;
        border-top: 0;
        border-bottom-left-radius: 25px;
      }
      .br {
        bottom: -3px;
        right: -3px;
        border-left: 0;
        border-top: 0;
        border-bottom-right-radius: 25px;
      }
      .scan-laser {
        width: 100%;
        height: 3px;
        background: #00b894;
        box-shadow: 0 0 20px 2px #00b894;
        position: absolute;
        top: 0;
        border-radius: 5px;
        animation: scanMove 2.5s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes scanMove {
        0%,
        100% {
          top: 10px;
          opacity: 0;
        }
        20%,
        80% {
          opacity: 1;
        }
        50% {
          top: 250px;
        }
      }
      .scan-text {
        color: white;
        margin-top: 30px;
        font-size: 0.95rem;
        letter-spacing: 0.5px;
        opacity: 0.8;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      }
      .scan-controls {
        position: absolute;
        bottom: 60px;
        width: 100%;
        z-index: 20;
        display: flex;
        justify-content: center;
        gap: 50px;
      }
      .control-btn {
        width: 60px;
        height: 60px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        color: white;
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        cursor: pointer;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .control-btn:active {
        transform: scale(0.85);
        background: rgba(255, 255, 255, 0.3);
      }
      .qr-modal {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #f1f5f9;
        z-index: 100;
        flex-direction: column;
        align-items: center;
        animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes slideUp {
        from {
          transform: translateY(100%);
        }
        to {
          transform: translateY(0);
        }
      }
      .qr-card-container {
        flex: 1;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
      }
      .qr-white-box {
        background: #ffffff;
        width: 100%;
        max-width: 350px;
        padding: 30px 25px;
        border-radius: 30px;
        box-shadow: 0 20px 40px -10px rgba(0, 77, 64, 0.1);
        text-align: center;
        position: relative;
        box-sizing: border-box;
        transition:
          background 0.3s ease,
          border-color 0.3s ease;
      }
      .currency-toggle {
        display: flex;
        background: #f1f5f9;
        border-radius: 14px;
        padding: 5px;
        margin-bottom: 25px;
        width: 100%;
        box-sizing: border-box;
        transition: background 0.3s ease;
      }
      .toggle-btn {
        flex: 1;
        text-align: center;
        padding: 10px 0;
        font-size: 0.9rem;
        font-weight: 700;
        color: #64748b;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
      }
      .toggle-btn.active {
        background: white;
        color: #004d40;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }
      .qr-logo-top {
        height: 40px;
        margin-bottom: 15px;
        transition: filter 0.3s ease;
      }
      .qr-user-name {
        margin: 0;
        font-size: 1.3rem;
        color: #1e293b;
        font-weight: 700;
        text-transform: uppercase;
        transition: color 0.3s ease;
      }
      .qr-user-acc {
        margin: 5px 0 20px;
        color: #00b894;
        font-family: "JetBrains Mono", monospace;
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: 1px;
      }
      .qr-img-wrapper {
        background: #ffffff;
        padding: 15px;
        border-radius: 20px;
        display: inline-block;
        margin-bottom: 25px;
        border: 1px solid #e2e8f0;
        box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.02);
      }
      #myQrImg {
        width: 220px;
        height: 220px;
        display: block;
        border-radius: 12px;
      }
      .amount-input-area {
        border-top: 1px dashed #e2e8f0;
        padding-top: 20px;
        width: 100%;
        transition: border-color 0.3s ease;
      }
      .amount-label {
        font-size: 0.8rem;
        color: #64748b;
        font-weight: 600;
        margin-bottom: 10px;
        transition: color 0.3s ease;
      }
      .amount-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .currency-symbol {
        font-size: 1.5rem;
        font-weight: 700;
        color: #94a3b8;
        margin-top: -2px;
        transition: color 0.3s ease;
      }
      #qrSetAmount {
        border: none;
        background: transparent;
        width: 160px;
        text-align: center;
        font-size: 2.2rem;
        font-weight: 700;
        color: #004d40;
        outline: none;
        font-family: "JetBrains Mono", sans-serif;
        transition: color 0.3s ease;
      }
      #qrSetAmount::placeholder {
        color: #cbd5e1;
      }
      .btn-save-qr {
        width: calc(100% - 40px);
        max-width: 350px;
        padding: 18px;
        background: #004d40;
        color: white;
        border: none;
        border-radius: 20px;
        font-weight: bold;
        font-size: 1.1rem;
        margin-bottom: 30px;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(0, 77, 64, 0.2);
      }
      .btn-save-qr:active {
        transform: scale(0.96);
      }
      .close-qr-btn {
        position: absolute;
        top: 25px;
        left: 20px;
        font-size: 1.2rem;
        color: #1e293b;
        cursor: pointer;
        background: #fff;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        border: 1px solid #e2e8f0;
        transition: 0.3s;
      }
      .close-qr-btn:active {
        transform: scale(0.9);
      }
      body.dark-mode {
        background-color: #000 !important;
      }
      body.dark-mode .app-container {
        background-color: #121212 !important;
      }
      body.dark-mode .qr-modal {
        background-color: #121212 !important;
      }
      body.dark-mode .qr-white-box {
        background-color: #1e1e1e !important;
        border: 1px solid #333 !important;
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5) !important;
      }
      body.dark-mode .qr-img-wrapper {
        background: #ffffff !important;
        border-color: #333 !important;
      }
      body.dark-mode .qr-user-name,
      body.dark-mode .amount-label,
      body.dark-mode .currency-symbol {
        color: #ffffff !important;
      }
      body.dark-mode #qrSetAmount {
        color: #10b981 !important;
      }
      body.dark-mode .qr-logo-top {
        filter: brightness(0) invert(1) !important;
      }
      body.dark-mode .amount-input-area {
        border-top-color: #444 !important;
      }
      body.dark-mode .currency-toggle {
        background-color: #2a2a2a !important;
      }
      body.dark-mode .toggle-btn {
        color: #888 !important;
      }
      body.dark-mode .toggle-btn.active {
        background-color: #444 !important;
        color: #fff !important;
      }
      body.dark-mode .close-qr-btn {
        background-color: #333 !important;
        color: #fff !important;
        border: none !important;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div id="reader"></div>
      <div class="scan-header">
        <a href="dashboard.html" class="back-link"
          ><i class="fa-solid fa-chevron-left"></i
        ></a>
        <span
          style="
            color: white;
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 1.1rem;
          "
          data-lang="title_scan"
          >SCAN QR</span
        >
        <div style="width: 24px"></div>
      </div>
      <div class="scan-overlay-ui">
        <div class="scan-frame">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
          <div class="scan-laser"></div>
        </div>
        <div class="scan-text kh-text" data-lang="scan_desc">
          ដាក់កូដ QR ក្នុងប្រអប់ដើម្បីស្កេន
        </div>
      </div>
      <div class="scan-controls">
        <div
          class="control-btn"
          title="Gallery"
          onclick="document.getElementById('qr-input-file').click()"
        >
          <i class="fa-regular fa-image"></i>
        </div>
        <div
          class="control-btn"
          title="My QR"
          onclick="showMyQR()"
          style="
            background: #00b894;
            color: #fff;
            border: none;
            box-shadow: 0 0 25px rgba(0, 184, 148, 0.4);
            transform: scale(1.15);
          "
        >
          <i class="fa-solid fa-qrcode"></i>
        </div>
        <div
          class="control-btn"
          title="Flash"
          id="flashBtn"
          onclick="toggleFlash()"
        >
          <i class="fa-solid fa-bolt"></i>
        </div>
      </div>
      <input
        type="file"
        id="qr-input-file"
        accept="image/*"
        style="display: none"
        onchange="scanFromGallery(event)"
      />

      <div id="qrModal" class="qr-modal">
        <div class="close-qr-btn" onclick="closeMyQR()">
          <i class="fa-solid fa-xmark"></i>
        </div>
        <div class="qr-card-container">
          <div class="qr-white-box" id="myQRContent">
            <div class="currency-toggle" id="qrToggleBar">
              <div
                class="toggle-btn active"
                id="btnUSD"
                onclick="switchQRCurrency('USD')"
              >
                USD ($)
              </div>
              <div
                class="toggle-btn"
                id="btnKHR"
                onclick="switchQRCurrency('KHR')"
              >
                KHR (៛)
              </div>
            </div>
            <img src="images/logo-nobg.png" class="qr-logo-top" alt="U-Pay" />
            <h3 id="qrUserName" class="qr-user-name">...</h3>
            <p id="qrUserAcc" class="qr-user-acc">...</p>
            <div class="qr-img-wrapper">
              <img id="myQrImg" src="" alt="QR Code" />
            </div>
            <div class="amount-input-area">
              <div class="amount-label kh-text" data-lang="set_amount">
                កំណត់ទឹកប្រាក់ចង់បាន
              </div>
              <div class="amount-row">
                <span class="currency-symbol" id="qrCurrencySymbol">$</span>
                <input
                  type="number"
                  id="qrSetAmount"
                  placeholder="0.00"
                  oninput="updateMyQR()"
                />
              </div>
            </div>
          </div>
        </div>
        <button
          onclick="downloadMyQR()"
          class="btn-save-qr kh-text"
          id="btnSaveQR"
        >
          <i class="fa-solid fa-download" style="margin-right: 8px"></i
          ><span data-lang="save_qr">រក្សាទុកក្នុងទូរស័ព្ទ</span>
        </button>
      </div>
    </div>

    <script>
      // ប្រើអថេរ activeUser ដូច u-pay-core.js
      let activeUser = JSON.parse(sessionStorage.getItem("user"));
      let apiToken = sessionStorage.getItem("userToken");
      if (!activeUser || !apiToken) window.location.href = "index.html";

      function applyTheme() {
        const userThemeKey = "darkMode_" + activeUser.username;
        const isDark =
          localStorage.getItem("theme") === "dark" ||
          localStorage.getItem(userThemeKey) === "true";
        if (isDark) document.body.classList.add("dark-mode");
        else document.body.classList.remove("dark-mode");
      }

      document.addEventListener("DOMContentLoaded", () => {
        applyTheme();
        if (typeof applyLanguage === "function") applyLanguage();
        document.body.classList.add("loaded");
        initScannerLogic();
      });

      function initScannerLogic() {
        const urlParams = new URLSearchParams(window.location.search);
        const isFromDashboard = urlParams.get("showQR") === "true";
        if (isFromDashboard) {
          document.querySelector(".scan-overlay-ui").style.display = "none";
          document.querySelector(".scan-controls").style.display = "none";
          const modal = document.getElementById("qrModal");
          modal.style.animation = "none";
          modal.style.display = "flex";
          document.body.style.backgroundColor =
            document.body.classList.contains("dark-mode") ? "#000" : "#f1f5f9";
        } else {
          startScanner();
        }
      }

      const socket = io("https://u-pay-bank.fly.dev");
      socket.emit("joinRoom", activeUser.username);
      socket.on("paymentReceived", (data) => {
        const ringtone = new Audio(
          "https://notificationsounds.com/storage/sounds/file-sounds-1148-juntos.mp3",
        );
        ringtone.play().catch((e) => {});
        const amountInput = document.getElementById("qrSetAmount").value;
        const isAmountSet = amountInput && parseFloat(amountInput) > 0;
        const symbol = data.currency === "USD" ? "$" : "៛";
        const formattedAmount = Number(data.amount).toLocaleString("en-US", {
          minimumFractionDigits: 2,
        });

        if (isAmountSet) {
          Swal.fire({
            icon: "success",
            title: '<span style="font-family: Kantumruy Pro">លុយចូលហើយ!</span>',
            html: `<span style="font-family: Kantumruy Pro">អ្នកទទួលបាន <b>${symbol}${formattedAmount}</b> ពី ${data.senderName}</span>`,
            confirmButtonText: "យល់ព្រម",
            confirmButtonColor: "#00b894",
            allowOutsideClick: false,
          }).then(() => (window.location.href = "dashboard.html"));
        } else {
          const Toast = Swal.mixin({
            toast: true,
            position: "top-end",
            showConfirmButton: false,
            timer: 4000,
            timerProgressBar: true,
          });
          Toast.fire({
            icon: "success",
            title: `<span style="font-family: Kantumruy Pro">ទទួលបាន ${symbol}${formattedAmount} ពី ${data.senderName}</span>`,
          });
        }
      });

      let qrCurrency = "USD";
      document.getElementById("qrUserName").textContent =
        activeUser.fullName || activeUser.username;

      function switchQRCurrency(currency) {
        qrCurrency = currency;
        document
          .getElementById("btnUSD")
          .classList.toggle("active", currency === "USD");
        document
          .getElementById("btnKHR")
          .classList.toggle("active", currency === "KHR");
        document.getElementById("qrCurrencySymbol").innerText =
          currency === "USD" ? "$" : "៛";

        const targetAcc =
          currency === "USD"
            ? activeUser.accountNumber
            : activeUser.accountNumberKHR;
        document.getElementById("qrUserAcc").textContent = targetAcc.replace(
          /(\d{3})(\d{3})(\d{3})/,
          "$1 $2 $3",
        );

        // 🔥 លុបចំនួនប្រាក់ចោលពេលប្តូររូបិយប័ណ្ណ
        document.getElementById("qrSetAmount").value = "";
        updateMyQR();
      }
      // កំណត់ QR ជា USD នៅពេលបើកដំបូង
      switchQRCurrency("USD");

      function updateMyQR() {
        const amount = document.getElementById("qrSetAmount").value;
        const targetAcc =
          qrCurrency === "USD"
            ? activeUser.accountNumber
            : activeUser.accountNumberKHR;
        let qrData = targetAcc;
        if (amount && amount > 0) qrData = `${targetAcc}:${amount}`;
        const qrColor = qrCurrency === "USD" ? "004d40" : "059669";
        document.getElementById("myQrImg").src =
          `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${qrData}&color=${qrColor}`;
      }

      function showMyQR() {
        document.getElementById("qrModal").style.display = "flex";
      }
      function closeMyQR() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get("showQR") === "true")
          window.location.href = "dashboard.html";
        else document.getElementById("qrModal").style.display = "none";
      }

      function downloadMyQR() {
        const btnSave = document.getElementById("btnSaveQR"),
          btnClose = document.querySelector(".close-qr-btn"),
          toggleBar = document.getElementById("qrToggleBar");
        btnSave.style.display = "none";
        btnClose.style.display = "none";
        toggleBar.style.display = "none";
        const isDark = document.body.classList.contains("dark-mode");
        html2canvas(document.getElementById("myQRContent"), {
          backgroundColor: isDark ? "#1e1e1e" : "#ffffff",
          scale: 3,
        }).then((canvas) => {
          const link = document.createElement("a");
          link.download = `U-Pay-QR-${activeUser.username}-${qrCurrency}.png`;
          link.href = canvas.toDataURL();
          link.click();
          btnSave.style.display = "block";
          btnClose.style.display = "flex";
          toggleBar.style.display = "flex";
        });
      }

      let html5QrCode = new Html5Qrcode("reader");
      let isCameraRunning = false,
        isFlashOn = false;

      async function startScanner() {
        try {
          const config = {
            fps: 20,
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.77,
          };
          await html5QrCode.start(
            { facingMode: "environment" },
            config,
            onScanSuccess,
          );
          isCameraRunning = true;
        } catch (err) {
          console.log("Camera fail: ", err);
        }
      }

      function onScanSuccess(decodedText) {
        if (isCameraRunning) {
          html5QrCode
            .stop()
            .then(() => (isCameraRunning = false))
            .catch((e) => {});
        }
        new Audio(
          "https://notificationsounds.com/storage/sounds/file-sounds-1148-juntos.mp3",
        ).play();

        if (
          decodedText.includes("transfer.html") &&
          decodedText.includes("acc=")
        ) {
          window.location.href = decodedText;
          return;
        }

        let targetAcc = decodedText,
          targetAmount = "",
          lockMoney = false;
        if (decodedText.includes(":")) {
          const parts = decodedText.split(":");
          targetAcc = parts[0];
          targetAmount = parts[1];
          lockMoney = true;
        }

        if (/^\d+$/.test(targetAcc) && targetAcc.length >= 8) {
          let url = `transfer.html?acc=${targetAcc}&source=qr`;
          if (targetAmount) {
            url += `&amount=${targetAmount}`;
            if (lockMoney) url += `&lockAmount=true`;
          }
          window.location.href = url;
        }
      }

      async function scanFromGallery(event) {
        const file = event.target.files[0];
        if (!file) return;
        if (isCameraRunning) {
          await html5QrCode.stop().catch(() => {});
          isCameraRunning = false;
        }
        Swal.fire({ title: "Scanning...", didOpen: () => Swal.showLoading() });
        try {
          const galleryScanner = new Html5Qrcode("reader");
          const result = await galleryScanner.scanFile(file, true);
          Swal.close();
          onScanSuccess(result);
        } catch (err) {
          Swal.close();
          let lang = localStorage.getItem("lang") || "en";
          Swal.fire({
            icon: "error",
            title: lang === "kh" ? "រកមិនឃើញកូដ QR ទេ!" : "No QR code found!",
            confirmButtonColor: "#004d40",
          }).then(() => startScanner());
        }
      }

      function toggleFlash() {
        if (!isCameraRunning) return;
        isFlashOn = !isFlashOn;
        html5QrCode.applyVideoConstraints({ advanced: [{ torch: isFlashOn }] });
        document.getElementById("flashBtn").style.background = isFlashOn
          ? "white"
          : "rgba(255, 255, 255, 0.15)";
        document.getElementById("flashBtn").style.color = isFlashOn
          ? "#000"
          : "white";
      }
    </script>
  </body>
</html>
