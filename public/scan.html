<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <title>Smart Scan AI - U-Pay</title>

    <!-- បណ្ដុំ Script សំខាន់ៗ -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script
      src="https://unpkg.com/html5-qrcode"
      type="text/javascript"
    ></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <!-- ➕ បន្ថែម ២ បន្ទាត់នេះចូលវិញ ➕ -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/lang.js"></script>

    <!-- បណ្ដុំ Fonts និង Icons -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Kantumruy+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      /* ==========================================
         🚀 GLOBAL & FOUC PREVENTION
         ========================================== */
      body {
        background-color: #f2f4f6;
        margin: 0;
        font-family: "Kantumruy Pro", "Inter", sans-serif;
        overflow: hidden;
        visibility: hidden;
        opacity: 0;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        transition:
          opacity 0.4s ease,
          background-color 0.3s ease;
        -webkit-font-smoothing: antialiased;
      }
      body.loaded {
        visibility: visible;
        opacity: 1;
      }
      .kh-text {
        font-family: "Kantumruy Pro", "Inter", sans-serif !important;
      }

      /* ==========================================
         📱 APP CONTAINER
         ========================================== */
      .app-container {
        width: 100%;
        max-width: 450px;
        height: 100vh;
        position: relative;
        background: #f8fafc;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        transition: background-color 0.3s;
      }

      /* ==========================================
         📷 SCANNER CAMERA & HEADER
         ========================================== */
      #reader {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }

      .scan-header {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 20;
        padding: 25px 20px;
        box-sizing: border-box;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), transparent);
      }
      .back-link {
        color: white;
        font-size: 1.4rem;
        text-decoration: none;
        opacity: 0.9;
        transition: 0.2s;
      }
      .back-link:active {
        opacity: 0.5;
        transform: scale(0.9);
      }

      /* ==========================================
         🎯 SCAN OVERLAY UI & LASER
         ========================================== */
      .scan-overlay-ui {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .scan-frame {
        width: 270px;
        height: 270px;
        position: relative;
        border-radius: 30px;
        box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .corner {
        position: absolute;
        width: 40px;
        height: 40px;
        border-color: #00b894;
        border-style: solid;
        border-width: 5px;
      }
      .tl {
        top: -3px;
        left: -3px;
        border-right: 0;
        border-bottom: 0;
        border-top-left-radius: 25px;
      }
      .tr {
        top: -3px;
        right: -3px;
        border-left: 0;
        border-bottom: 0;
        border-top-right-radius: 25px;
      }
      .bl {
        bottom: -3px;
        left: -3px;
        border-right: 0;
        border-top: 0;
        border-bottom-left-radius: 25px;
      }
      .br {
        bottom: -3px;
        right: -3px;
        border-left: 0;
        border-top: 0;
        border-bottom-right-radius: 25px;
      }

      .scan-laser {
        width: 100%;
        height: 3px;
        background: #00b894;
        box-shadow: 0 0 20px 2px #00b894;
        position: absolute;
        top: 0;
        border-radius: 5px;
        animation: scanMove 2.5s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes scanMove {
        0%,
        100% {
          top: 10px;
          opacity: 0;
        }
        20%,
        80% {
          opacity: 1;
        }
        50% {
          top: 250px;
        }
      }

      .scan-text {
        color: white;
        margin-top: 30px;
        font-size: 0.95rem;
        letter-spacing: 0.5px;
        opacity: 0.8;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      }

      /* ==========================================
         🎛️ SCAN CONTROLS (BOTTOM)
         ========================================== */
      .scan-controls {
        position: absolute;
        bottom: 60px;
        width: 100%;
        z-index: 20;
        display: flex;
        justify-content: center;
        gap: 50px;
      }
      .control-btn {
        width: 60px;
        height: 60px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        color: white;
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        cursor: pointer;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .control-btn:active {
        transform: scale(0.85);
        background: rgba(255, 255, 255, 0.3);
      }

      /* ==========================================
         🔥 MODAL "MY QR"
         ========================================== */
      .qr-modal {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #f1f5f9;
        z-index: 100;
        flex-direction: column;
        align-items: center;
        animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes slideUp {
        from {
          transform: translateY(100%);
        }
        to {
          transform: translateY(0);
        }
      }

      .qr-card-container {
        flex: 1;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
      }
      .qr-white-box {
        background: #ffffff;
        width: 100%;
        max-width: 350px;
        padding: 30px 25px;
        border-radius: 30px;
        box-shadow: 0 20px 40px -10px rgba(0, 77, 64, 0.1);
        text-align: center;
        position: relative;
        box-sizing: border-box;
        transition:
          background 0.3s ease,
          border-color 0.3s ease;
      }

      /* 🔥 SELECTOR ACCOUNT (ជំនួស Toggle ចាស់) */
      .account-selector {
        width: 100%;
        padding: 12px 15px;
        border-radius: 14px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        color: #1e293b;
        font-size: 0.95rem;
        font-family: "Kantumruy Pro", "Inter", sans-serif;
        font-weight: 600;
        margin-bottom: 20px;
        outline: none;
        appearance: none;
        background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2364748b%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
        background-repeat: no-repeat;
        background-position: right 15px top 50%;
        background-size: 12px auto;
        transition: all 0.3s;
        cursor: pointer;
      }
      .account-selector:focus {
        border-color: #00b894;
        box-shadow: 0 0 0 3px rgba(0, 184, 148, 0.1);
      }

      .qr-logo-top {
        height: 40px;
        margin-bottom: 10px;
        transition: filter 0.3s ease;
      }
      .qr-user-name {
        margin: 0;
        font-size: 1.2rem;
        color: #1e293b;
        font-weight: 700;
        text-transform: uppercase;
        transition: color 0.3s ease;
      }
      .qr-user-acc {
        margin: 5px 0 20px;
        color: #00b894;
        font-family: "JetBrains Mono", monospace;
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: 1px;
      }

      /* 🔥 កន្លែង QR & Logo កណ្តាល */
      .qr-img-wrapper {
        background: #ffffff;
        padding: 15px;
        border-radius: 20px;
        display: inline-block;
        margin-bottom: 25px;
        border: 1px solid #e2e8f0;
        box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.02);
        position: relative; /* សំខាន់ដើម្បីអោយ Logo នៅចំកណ្តាល */
      }
      #myQrImg {
        width: 220px;
        height: 220px;
        display: block;
        border-radius: 12px;
      }
      .qr-center-logo {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 45px;
        height: 45px;
        background: #ffffff;
        border-radius: 10px;
        padding: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        z-index: 5;
      }

      .amount-input-area {
        border-top: 1px dashed #e2e8f0;
        padding-top: 20px;
        width: 100%;
        transition: border-color 0.3s ease;
      }
      .amount-label {
        font-size: 0.8rem;
        color: #64748b;
        font-weight: 600;
        margin-bottom: 10px;
        transition: color 0.3s ease;
      }
      .amount-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .currency-symbol {
        font-size: 1.5rem;
        font-weight: 700;
        color: #94a3b8;
        margin-top: -2px;
        transition: color 0.3s ease;
      }

      #qrSetAmount {
        border: none;
        background: transparent;
        width: 160px;
        text-align: center;
        font-size: 2.2rem;
        font-weight: 700;
        color: #004d40;
        outline: none;
        font-family: "JetBrains Mono", sans-serif;
        transition: color 0.3s ease;
      }
      #qrSetAmount::placeholder {
        color: #cbd5e1;
      }

      .btn-save-qr {
        width: calc(100% - 40px);
        max-width: 350px;
        padding: 18px;
        background: #004d40;
        color: white;
        border: none;
        border-radius: 20px;
        font-weight: bold;
        font-size: 1.1rem;
        margin-bottom: 30px;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(0, 77, 64, 0.2);
      }
      .btn-save-qr:active {
        transform: scale(0.96);
      }

      .close-qr-btn {
        position: absolute;
        top: 25px;
        left: 20px;
        font-size: 1.2rem;
        color: #1e293b;
        cursor: pointer;
        background: #fff;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        border: 1px solid #e2e8f0;
        transition: 0.3s;
      }
      .close-qr-btn:active {
        transform: scale(0.9);
      }

      /* ==========================================
         🌙 DARK MODE OVERRIDES
         ========================================== */
      body.dark-mode {
        background-color: #000 !important;
      }
      body.dark-mode .app-container {
        background-color: #121212 !important;
      }
      body.dark-mode .qr-modal {
        background-color: #121212 !important;
      }
      body.dark-mode .qr-white-box {
        background-color: #1e1e1e !important;
        border: 1px solid #333 !important;
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5) !important;
      }
      body.dark-mode .qr-img-wrapper {
        background: #ffffff !important;
        border-color: #333 !important;
      }
      body.dark-mode .qr-user-name,
      body.dark-mode .amount-label,
      body.dark-mode .currency-symbol {
        color: #ffffff !important;
      }
      body.dark-mode #qrSetAmount {
        color: #10b981 !important;
      }
      body.dark-mode .qr-logo-top {
        filter: brightness(0) invert(1) !important;
      }
      body.dark-mode .amount-input-area {
        border-top-color: #444 !important;
      }

      /* Dark mode សម្រាប់ Account Selector */
      body.dark-mode .account-selector {
        background-color: #2a2a2a !important;
        border-color: #444 !important;
        color: #fff !important;
        background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23ffffff%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      }
      body.dark-mode .close-qr-btn {
        background-color: #333 !important;
        color: #fff !important;
        border: none !important;
      }
    </style>
  </head>
  <body>
    <!-- 🔥 រុញ Modal ចូលមកក្នុង App Container វិញ -->
    <div class="app-container">
      <div id="reader"></div>

      <div class="scan-header">
        <a href="dashboard.html" class="back-link"
          ><i class="fa-solid fa-chevron-left"></i
        ></a>
        <span
          style="
            color: white;
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 1.1rem;
          "
          data-lang="title_scan"
          >SCAN QR</span
        >
        <div style="width: 24px"></div>
      </div>

      <div class="scan-overlay-ui">
        <div class="scan-frame">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
          <div class="scan-laser"></div>
        </div>
        <div class="scan-text kh-text" data-lang="scan_desc">
          ដាក់កូដ QR ក្នុងប្រអប់ដើម្បីស្កេន
        </div>
      </div>

      <div class="scan-controls">
        <div
          class="control-btn"
          title="Gallery"
          onclick="document.getElementById('qr-input-file').click()"
        >
          <i class="fa-regular fa-image"></i>
        </div>
        <div
          class="control-btn"
          title="My QR"
          onclick="showMyQR()"
          style="
            background: #00b894;
            color: #fff;
            border: none;
            box-shadow: 0 0 25px rgba(0, 184, 148, 0.4);
            transform: scale(1.15);
          "
        >
          <i class="fa-solid fa-qrcode"></i>
        </div>
        <div
          class="control-btn"
          title="Flash"
          id="flashBtn"
          onclick="toggleFlash()"
        >
          <i class="fa-solid fa-bolt"></i>
        </div>
      </div>

      <input
        type="file"
        id="qr-input-file"
        accept="image/*"
        style="display: none"
        onchange="scanFromGallery(event)"
      />

      <!-- 🔥 MODAL រុញចូលមកក្នុងនេះ ដើម្បីអោយវាប៉ុនទូរសព្ទ -->
      <div id="qrModal" class="qr-modal">
        <div class="close-qr-btn" onclick="closeMyQR()">
          <i class="fa-solid fa-xmark"></i>
        </div>

        <div class="qr-card-container">
          <div class="qr-white-box" id="myQRContent">
            <!-- 🔥 Dropdown រើសគណនី (ជំនួសអោយ Toggle ចាស់) -->
            <select
              id="accountSelector"
              class="account-selector"
              onchange="updateAccountSelection()"
            >
              <!-- Options នឹងត្រូវបានបញ្ចូលដោយ JavaScript -->
            </select>

            <img src="images/logo-nobg.png" class="qr-logo-top" alt="U-Pay" />
            <h3 id="qrUserName" class="qr-user-name">...</h3>
            <p id="qrUserAcc" class="qr-user-acc">...</p>

            <div class="qr-img-wrapper">
              <img id="myQrImg" src="" alt="QR Code" />
              <!-- 🔥 រូប Logo តូចនៅកណ្តាល QR -->
              <img
                src="images/logo-nobg.png"
                class="qr-center-logo"
                alt="logo"
              />
            </div>

            <div class="amount-input-area">
              <div class="amount-label kh-text" data-lang="set_amount">
                កំណត់ទឹកប្រាក់ចង់បាន
              </div>
              <div class="amount-row">
                <span class="currency-symbol" id="qrCurrencySymbol">$</span>
                <input
                  type="number"
                  id="qrSetAmount"
                  placeholder="0.00"
                  oninput="updateMyQR()"
                />
              </div>
            </div>
          </div>
        </div>

        <button
          onclick="downloadMyQR()"
          class="btn-save-qr kh-text"
          id="btnSaveQR"
        >
          <i class="fa-solid fa-download" style="margin-right: 8px"></i>
          <span data-lang="save_qr">រក្សាទុកក្នុងទូរស័ព្ទ</span>
        </button>
      </div>
    </div>

    <script>
      // ==========================================
      // 🔥 1. JWT SECURITY & SESSION MANAGEMENT
      // ==========================================
      let user = JSON.parse(sessionStorage.getItem("user"));
      let token = sessionStorage.getItem("userToken");
      if (!user || !token) window.location.href = "index.html";

      // ==========================================
      // 🌙 2. THEME & LANG
      // ==========================================
      const userThemeKey = "darkMode_" + user.username;
      function applyTheme() {
        const isDark =
          localStorage.getItem("theme") === "dark" ||
          localStorage.getItem(userThemeKey) === "true";
        if (isDark) {
          document.body.classList.add("dark-mode");
        } else {
          document.body.classList.remove("dark-mode");
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        applyTheme();
        if (typeof applyLanguage === "function") applyLanguage();
        document.body.classList.add("loaded");

        // ហៅមុខងារបញ្ចូលគណនីទៅក្នុង Dropdown
        populateAccounts();
        initScannerLogic();
      });

      // ==========================================
      // 📱 3. UI LOGIC (QR Show/Hide & Init)
      // ==========================================
      function initScannerLogic() {
        const urlParams = new URLSearchParams(window.location.search);
        const isFromDashboard = urlParams.get("showQR") === "true";

        if (isFromDashboard) {
          document.querySelector(".scan-overlay-ui").style.display = "none";
          document.querySelector(".scan-controls").style.display = "none";
          const modal = document.getElementById("qrModal");
          modal.style.animation = "none";
          modal.style.display = "flex";
          document.body.style.backgroundColor =
            document.body.classList.contains("dark-mode") ? "#000" : "#f1f5f9";
        } else {
          startScanner();
        }
      }

      // ==========================================
      // 🔄 4. SOCKET.IO (Live Payment Notification)
      // ==========================================
      const socket = io("https://u-pay-bank.fly.dev"); // ប្តូរទៅ URL Backend ពិត
      socket.emit("joinRoom", user.username);

      socket.on("paymentReceived", (data) => {
        const ringtone = new Audio(
          "https://notificationsounds.com/storage/sounds/file-sounds-1148-juntos.mp3",
        );
        ringtone
          .play()
          .catch((e) => console.log("Audio blocked by browser", e));

        const amountInput = document.getElementById("qrSetAmount").value;
        const isAmountSet = amountInput && parseFloat(amountInput) > 0;
        const symbol = data.currency === "USD" ? "$" : "៛";
        const formattedAmount = Number(data.amount).toLocaleString("en-US", {
          minimumFractionDigits: 2,
        });

        if (isAmountSet) {
          Swal.fire({
            icon: "success",
            title: '<span style="font-family: Kantumruy Pro">លុយចូលហើយ!</span>',
            html: `<span style="font-family: Kantumruy Pro">អ្នកទទួលបាន <b>${symbol}${formattedAmount}</b> ពី ${data.senderName}</span>`,
            confirmButtonText: "យល់ព្រម",
            confirmButtonColor: "#00b894",
            allowOutsideClick: false,
          }).then(() => {
            window.location.href = "dashboard.html";
          });
        } else {
          const Toast = Swal.mixin({
            toast: true,
            position: "top-end",
            showConfirmButton: false,
            timer: 4000,
            timerProgressBar: true,
            didOpen: (toast) => {
              toast.addEventListener("mouseenter", Swal.stopTimer);
              toast.addEventListener("mouseleave", Swal.resumeTimer);
            },
          });
          Toast.fire({
            icon: "success",
            title: `<span style="font-family: Kantumruy Pro">ទទួលបាន ${symbol}${formattedAmount} ពី ${data.senderName}</span>`,
          });
        }
      });

      // ==========================================
      // 💳 5. MY QR GENERATION (Updated for Dropdown)
      // ==========================================
      let qrCurrency = "USD"; // រក្សាទុកតម្លៃសកលសម្រាប់ពេល Download

      // បញ្ចូលគណនីទាំងអស់របស់ User ទៅកាន់ Dropdown
      function populateAccounts() {
        const selector = document.getElementById("accountSelector");
        selector.innerHTML = "";

        // 1. បញ្ចូលគណនី Main USD
        let optUSD = document.createElement("option");
        optUSD.value = user.accountNumber;
        optUSD.dataset.currency = "USD";
        optUSD.dataset.accName = user.fullName || user.username;
        optUSD.textContent = `Main USD - ${user.accountNumber}`;
        selector.appendChild(optUSD);

        // 2. បញ្ចូលគណនី Main KHR (បើមាន)
        if (user.accountNumberKHR) {
          let optKHR = document.createElement("option");
          optKHR.value = user.accountNumberKHR;
          optKHR.dataset.currency = "KHR";
          optKHR.dataset.accName = user.fullName || user.username;
          optKHR.textContent = `Main KHR - ${user.accountNumberKHR}`;
          selector.appendChild(optKHR);
        }

        // 3. បញ្ចូលគណនី Sub-Accounts (Premium, Joint)
        if (user.subAccounts && user.subAccounts.length > 0) {
          user.subAccounts.forEach((acc) => {
            let opt = document.createElement("option");
            opt.value = acc.accountNumber;
            opt.dataset.currency = acc.currency;
            opt.dataset.accName = acc.accountName; // ប្រើឈ្មោះកុងរង ឧ. "DARA AND SINA"
            let typeLabel =
              acc.accountType === "joint" || acc.accountType === "joint_member"
                ? "Joint"
                : "Premium";
            opt.textContent = `${acc.accountName} (${typeLabel} ${acc.currency}) - ${acc.accountNumber}`;
            selector.appendChild(opt);
          });
        }

        updateAccountSelection();
      }

      // អាប់ដេតពេល User ជ្រើសរើសកុងផ្សេង
      function updateAccountSelection() {
        const selector = document.getElementById("accountSelector");
        const selectedOpt = selector.options[selector.selectedIndex];

        const targetAcc = selectedOpt.value;
        const currency = selectedOpt.dataset.currency;
        const targetName = selectedOpt.dataset.accName;

        qrCurrency = currency;
        document.getElementById("qrCurrencySymbol").innerText =
          currency === "USD" ? "$" : "៛";

        // Update ឈ្មោះអោយត្រូវនឹងប្រភេទគណនី (ឧ. បើកុង Joint គឺចេញឈ្មោះ ២)
        document.getElementById("qrUserName").textContent = targetName;

        // Format លេខគណនីមានចន្លោះ
        document.getElementById("qrUserAcc").textContent = targetAcc.replace(
          /(\d{3})(\d{3})(\d{3})/,
          "$1 $2 $3",
        );

        updateMyQR();
      }

      function updateMyQR() {
        const amount = document.getElementById("qrSetAmount").value;
        const selector = document.getElementById("accountSelector");
        const targetAcc = selector.options[selector.selectedIndex].value;

        let qrData = targetAcc;
        if (amount && amount > 0) qrData = `${targetAcc}:${amount}`;
        const qrColor = qrCurrency === "USD" ? "004d40" : "059669";

        // 🔥 ប្រើ parameter &ecc=H (High Error Correction) ដើម្បីអោយការដាក់ Logo នៅកណ្តាល មិនប៉ះពាល់ដល់ការស្កេន
        document.getElementById("myQrImg").src =
          `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${qrData}&color=${qrColor}&ecc=H`;
      }

      function showMyQR() {
        document.getElementById("qrModal").style.display = "flex";
      }

      function closeMyQR() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get("showQR") === "true") {
          window.location.href = "dashboard.html";
        } else {
          document.getElementById("qrModal").style.display = "none";
        }
      }

      function downloadMyQR() {
        const btnSave = document.getElementById("btnSaveQR");
        const btnClose = document.querySelector(".close-qr-btn");
        const selector = document.getElementById("accountSelector");

        // លាក់ UI បណ្តោះអាសន្ន មុនពេលថតរូប
        btnSave.style.display = "none";
        btnClose.style.display = "none";
        selector.style.display = "none";

        const isDark = document.body.classList.contains("dark-mode");
        html2canvas(document.getElementById("myQRContent"), {
          backgroundColor: isDark ? "#1e1e1e" : "#ffffff",
          scale: 3,
        }).then((canvas) => {
          const link = document.createElement("a");
          link.download = `U-Pay-QR-${user.username}-${qrCurrency}.png`;
          link.href = canvas.toDataURL();
          link.click();

          // បង្ហាញ UI មកវិញ
          btnSave.style.display = "block";
          btnClose.style.display = "flex";
          selector.style.display = "block";
        });
      }

      // ==========================================
      // 📷 6. HTML5 QR SCANNER LOGIC
      // ==========================================
      let html5QrCode = new Html5Qrcode("reader");
      let isCameraRunning = false;
      let isFlashOn = false;

      async function startScanner() {
        try {
          const config = {
            fps: 20,
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.77,
          };
          await html5QrCode.start(
            { facingMode: "environment" },
            config,
            onScanSuccess,
          );
          isCameraRunning = true;
        } catch (err) {
          console.log("Camera fail: ", err);
        }
      }

      function onScanSuccess(decodedText) {
        if (isCameraRunning) {
          html5QrCode
            .stop()
            .then(() => (isCameraRunning = false))
            .catch((e) => {});
        }
        new Audio(
          "https://notificationsounds.com/storage/sounds/file-sounds-1148-juntos.mp3",
        ).play();

        if (decodedText.startsWith("UFND-")) {
          window.location.href = `transfer.html?acc=${decodedText}&source=qr`;
          return;
        }

        if (
          decodedText.includes("transfer.html") &&
          decodedText.includes("acc=")
        ) {
          window.location.href = decodedText;
          return;
        }

        let targetAcc = decodedText;
        let targetAmount = "";
        let lockMoney = false;

        if (decodedText.includes(":")) {
          const parts = decodedText.split(":");
          targetAcc = parts[0];
          targetAmount = parts[1];
          lockMoney = true;
        }

        if (/^\d+$/.test(targetAcc) && targetAcc.length >= 8) {
          let url = `transfer.html?acc=${targetAcc}&source=qr`;
          if (targetAmount) {
            url += `&amount=${targetAmount}`;
            if (lockMoney) url += `&lockAmount=true`;
          }
          window.location.href = url;
        }
      }

      async function scanFromGallery(event) {
        const file = event.target.files[0];
        if (!file) return;

        if (isCameraRunning) {
          await html5QrCode.stop().catch(() => {});
          isCameraRunning = false;
        }
        Swal.fire({ title: "Scanning...", didOpen: () => Swal.showLoading() });

        try {
          const galleryScanner = new Html5Qrcode("reader");
          const result = await galleryScanner.scanFile(file, true);
          Swal.close();
          onScanSuccess(result);
        } catch (err) {
          Swal.close();
          let lang = localStorage.getItem("lang") || "en";
          let errorText =
            lang === "kh" ? "រកមិនឃើញកូដ QR ទេ!" : "No QR code found!";
          Swal.fire({
            icon: "error",
            title: errorText,
            confirmButtonColor: "#004d40",
          }).then(() => startScanner());
        }
      }

      function toggleFlash() {
        if (!isCameraRunning) return;
        isFlashOn = !isFlashOn;
        html5QrCode.applyVideoConstraints({ advanced: [{ torch: isFlashOn }] });
        document.getElementById("flashBtn").style.background = isFlashOn
          ? "white"
          : "rgba(255, 255, 255, 0.15)";
        document.getElementById("flashBtn").style.color = isFlashOn
          ? "#000"
          : "white";
      }
    </script>
  </body>
</html>
