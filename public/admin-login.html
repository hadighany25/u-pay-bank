<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <title>U-Pay Admin Secure Login</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      :root {
        --primary: #0f172a;
        --secondary: #10b981;
        --secondary-hover: #059669;
        --accent: #3b82f6;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --input-bg: #f8fafc;
      }
      body {
        margin: 0;
        font-family: "Inter", "Kantumruy Pro", sans-serif;
        /* Premium Dark Background with Glowing Orbs */
        background-color: var(--primary);
        background-image:
          radial-gradient(
            circle at 15% 50%,
            rgba(16, 185, 129, 0.15),
            transparent 25%
          ),
          radial-gradient(
            circle at 85% 30%,
            rgba(59, 130, 246, 0.15),
            transparent 25%
          );
        min-height: 100vh;
        height: 100dvh; /* ការពារកុំឱ្យអេក្រង់លោតពេលលោត Keyboard លើទូរស័ព្ទ */
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
        overflow: hidden; /* បិទ Scrollbar កុំឱ្យលោត */
      }

      /* Glassmorphism Card */
      .login-container {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
        width: 100%;
        max-width: 420px;
        padding: 45px 40px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow:
          0 25px 50px -12px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        text-align: center;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(30px);
      }

      @keyframes slideUpFade {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo-wrapper {
        position: relative;
        display: inline-block;
        margin-bottom: 25px;
      }
      .logo-wrapper::after {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: var(--secondary);
        filter: blur(25px);
        opacity: 0.2;
        top: 0;
        left: 0;
        z-index: -1;
      }
      .logo {
        width: 85px;
        height: auto;
        display: block;
      }

      h2 {
        margin: 0 0 8px;
        font-size: 1.85rem;
        font-weight: 800;
        color: var(--primary);
        letter-spacing: -0.5px;
      }
      p.subtitle {
        color: var(--text-muted);
        font-size: 0.95rem;
        margin-bottom: 35px;
        font-weight: 500;
      }

      /* Premium Inputs */
      .input-group {
        text-align: left;
        margin-bottom: 22px;
        position: relative;
      }
      .input-group label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 8px;
      }
      .input-group i {
        position: absolute;
        left: 16px;
        bottom: 14.5px;
        color: #94a3b8;
        font-size: 1.1rem;
        transition: color 0.3s ease;
      }
      .input-group input {
        width: 100%;
        padding: 14px 15px 14px 45px;
        border: 2px solid var(--border);
        background-color: var(--input-bg);
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 500;
        font-family: inherit;
        color: var(--text-main);
        outline: none;
        transition: all 0.3s ease;
        box-sizing: border-box;
      }
      .input-group input::placeholder {
        color: #94a3b8;
        font-weight: 400;
      }
      .input-group input:focus {
        background-color: #ffffff;
        border-color: var(--secondary);
        box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
      }
      .input-group input:focus + i,
      .input-group input:not(:placeholder-shown) ~ i {
        color: var(--secondary);
      }

      /* Premium Button */
      .btn-login {
        width: 100%;
        background: linear-gradient(135deg, var(--secondary) 0%, #059669 100%);
        color: white;
        border: none;
        padding: 16px;
        border-radius: 12px;
        font-size: 1.05rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        font-family: inherit;
        margin-top: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
      }
      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(16, 185, 129, 0.35);
      }
      .btn-login:active {
        transform: translateY(1px);
        box-shadow: 0 2px 8px rgba(16, 185, 129, 0.2);
      }

      /* Custom SweetAlert */
      .premium-swal {
        border-radius: 20px !important;
        font-family: "Kantumruy Pro", sans-serif;
      }

      /* Mobile Responsiveness */
      @media (max-width: 480px) {
        .login-container {
          padding: 35px 25px;
          border-radius: 20px;
          width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="logo-wrapper">
        <img
          src="images/logo.png"
          alt="U-Pay Logo"
          class="logo"
          onerror="
            this.src = 'https://cdn-icons-png.flaticon.com/512/2830/2830284.png'
          "
        />
      </div>
      <h2>Admin Portal</h2>
      <p class="subtitle">Secure access for authorized personnel</p>

      <div class="input-group">
        <label>Username</label>
        <input
          type="text"
          id="username"
          placeholder="Enter your username"
          autocomplete="off"
        />
        <i class="fa-solid fa-user"></i>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          autocomplete="off"
        />
        <i class="fa-solid fa-lock"></i>
      </div>

      <button class="btn-login" id="loginBtn" onclick="attemptLogin()">
        Secure Login <i class="fa-solid fa-arrow-right-to-bracket"></i>
      </button>
    </div>

    <script>
      // 🔥 ប្តូរ Path អោយលោតចូល Folder ថ្មី "admin/index.html"
      if (sessionStorage.getItem("adminToken")) {
        window.location.href = "admin/index.html";
      }

      document
        .getElementById("username")
        .addEventListener("keypress", function (event) {
          if (event.key === "Enter") {
            event.preventDefault();
            document.getElementById("password").focus();
          }
        });

      document
        .getElementById("password")
        .addEventListener("keypress", function (event) {
          if (event.key === "Enter") {
            event.preventDefault();
            attemptLogin();
          }
        });

      async function attemptLogin() {
        const user = document.getElementById("username").value.trim();
        const pass = document.getElementById("password").value.trim();
        const btn = document.getElementById("loginBtn");

        if (!user || !pass) {
          return Swal.fire({
            icon: "warning",
            title: "បំពេញព័ត៌មានមិនទាន់គ្រប់",
            text: "សូមបញ្ចូលឈ្មោះ និងលេខសម្ងាត់របស់អ្នក!",
            customClass: { popup: "premium-swal" },
            scrollbarPadding: false,
            heightAuto: false,
            confirmButtonColor: "#10b981",
          });
        }

        const originalText = btn.innerHTML;
        btn.innerHTML =
          '<i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating...';
        btn.disabled = true;

        try {
          const res = await fetch("/api/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: user, password: pass }),
          });
          const data = await res.json();

          if (data.success) {
            sessionStorage.setItem("adminToken", data.token);
            sessionStorage.setItem("adminRole", data.user.role);

            Swal.fire({
              icon: "success",
              title: "Login Success",
              text: `Welcome back, ${data.user.fullName || data.user.role}!`,
              showConfirmButton: false,
              timer: 1500,
              customClass: { popup: "premium-swal" },
              scrollbarPadding: false,
              heightAuto: false,
            }).then(() => {
              // 🔥 លោតចូលទៅកាន់ទំព័រ Dashboard ក្នុង Folder ថ្មី
              window.location.href = "admin/index.html";
            });
          } else {
            Swal.fire({
              icon: "error",
              title: "Access Denied",
              text: data.message,
              customClass: { popup: "premium-swal" },
              scrollbarPadding: false,
              heightAuto: false,
              confirmButtonColor: "#ef4444",
            });
            btn.innerHTML = originalText;
            btn.disabled = false;
          }
        } catch (err) {
          Swal.fire({
            icon: "error",
            title: "System Error",
            text: "មិនអាចភ្ជាប់ទៅកាន់ Server បានទេ។",
            customClass: { popup: "premium-swal" },
            scrollbarPadding: false,
            heightAuto: false,
            confirmButtonColor: "#ef4444",
          });
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
