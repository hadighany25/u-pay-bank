<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <title>Manage Kids - U-Pay</title>

    <!-- Fonts & Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Kantumruy+Pro:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/lang.js"></script>
    <script src="js/toast.js"></script>

    <style>
      /* ==========================================
         🚀 FOUC PREVENTION
         ========================================== */
      body {
        background-color: #f2f4f6;
        margin: 0;
        font-family: "Inter", "Kantumruy Pro", sans-serif;
        visibility: hidden;
        opacity: 0;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        transition:
          opacity 0.4s ease,
          background-color 0.3s ease;
        -webkit-font-smoothing: antialiased;
      }
      body.loaded {
        visibility: visible;
        opacity: 1;
      }

      /* ==========================================
         📱 BASE APP CONTAINER & LAYOUT
         ========================================== */
      .app-container {
        width: 100%;
        max-width: 450px;
        background: #f8fafc;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        transition: background-color 0.3s;
        padding-bottom: 90px;
        position: relative;
      }
      .nav-header {
        padding: 20px;
        background: #004d40;
        color: white;
        display: flex;
        align-items: center;
        gap: 15px;
        font-size: 1.1rem;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .nav-header a {
        color: white;
        text-decoration: none;
      }
      .content-body {
        padding: 20px 20px 30px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      /* ==========================================
         👶 JUNIOR MANAGEMENT STYLES
         ========================================== */
      .add-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        background: #e0f2f1;
        color: #004d40;
        border: 2px dashed #004d40;
        padding: 15px;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 25px;
        transition: 0.2s;
      }
      .add-btn:active {
        transform: scale(0.98);
        background: #b2dfdb;
      }

      .junior-card {
        background: #ffffff;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
        position: relative;
        overflow: hidden;
        border: 1px solid #f1f5f9;
      }

      .status-badge {
        position: absolute;
        top: 15px;
        right: 15px;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .status-active {
        background: #dcfce7;
        color: #10b981;
      }
      .status-frozen {
        background: #fee2e2;
        color: #e11d48;
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 15px;
      }
      .profile-icon {
        width: 50px;
        height: 50px;
        background: #fce7f3;
        color: #db2777;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
      }
      .kid-info h3 {
        font-size: 1.1rem;
        margin-bottom: 4px;
        color: #1e293b;
      }
      .kid-info p {
        font-size: 0.85rem;
        color: #64748b;
      }

      .balance-box {
        background: #f8fafc;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .bal-label {
        color: #64748b;
        font-size: 0.9rem;
      }
      .bal-amount {
        font-size: 1.4rem;
        font-weight: 700;
        color: #004d40;
      }

      .action-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .action-btn {
        background: none;
        border: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        color: #64748b;
      }
      .action-btn .icon-bg {
        width: 45px;
        height: 45px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        transition: 0.2s;
      }
      .action-btn span {
        font-size: 0.75rem;
        font-weight: 500;
      }
      .btn-topup .icon-bg {
        background: #ecfdf5;
        color: #10b981;
      }
      .btn-history .icon-bg {
        background: #eff6ff;
        color: #3b82f6;
      }
      .btn-limit .icon-bg {
        background: #fffbeb;
        color: #f59e0b;
      }
      .btn-freeze .icon-bg {
        background: #fef2f2;
        color: #ef4444;
      }
      .action-btn:active .icon-bg {
        transform: scale(0.9);
      }

      /* ==========================================
         BOTTOM NAV 
         ========================================== */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        width: 100%;
        max-width: 450px;
        display: flex;
        background: white;
        padding: 12px 0 15px 0;
        justify-content: space-around;
        box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.05);
        z-index: 999;
        border-radius: 20px 20px 0 0;
      }
      .nav-item {
        text-align: center;
        color: #94a3b8;
        font-size: 0.75rem;
        text-decoration: none;
        cursor: pointer;
        flex: 1;
        transition: 0.2s;
      }
      .nav-item i {
        font-size: 1.4rem;
        display: block;
        margin-bottom: 5px;
      }
      .nav-item.active {
        color: #004d40;
        font-weight: 700;
        transform: translateY(-5px);
      }

      /* ==========================================
         🔥 CUSTOM BOTTOM SHEET MODALS
         ========================================== */
      .custom-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 10000;
        align-items: flex-end;
        justify-content: center;
      }
      .modal-content {
        background: white;
        width: 100%;
        max-width: 450px;
        border-radius: 25px 25px 0 0;
        padding: 30px 25px;
        box-sizing: border-box;
        animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes slideUp {
        from {
          transform: translateY(100%);
        }
        to {
          transform: translateY(0);
        }
      }
      .modal-title {
        font-size: 1.2rem;
        margin-bottom: 20px;
        text-align: center;
        color: #1e293b;
      }

      .modal-input {
        width: 100%;
        padding: 15px;
        margin-bottom: 15px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        font-size: 1rem;
        box-sizing: border-box;
        text-align: center;
      }
      .modal-input:focus {
        outline: none;
        border-color: #004d40;
      }

      .btn-full {
        width: 100%;
        padding: 15px;
        background: #004d40;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        margin-bottom: 10px;
      }
      .btn-full:active {
        transform: scale(0.98);
      }
      .btn-cancel {
        background: #f1f5f9;
        color: #64748b;
      }
      .btn-danger {
        background: #ef4444;
      }

      /* Dark Mode Overrides */
      body.dark-mode {
        background-color: #000000 !important;
      }
      body.dark-mode .app-container {
        background-color: #121212 !important;
      }
      body.dark-mode .nav-header {
        background-color: #00251f !important;
      }
      body.dark-mode .junior-card {
        background: #1e1e1e !important;
        border-color: #2d2d2d !important;
      }
      body.dark-mode .kid-info h3,
      body.dark-mode .modal-title {
        color: #ffffff !important;
      }
      body.dark-mode .balance-box {
        background: #2d2d2d !important;
      }
      body.dark-mode .bottom-nav,
      body.dark-mode .modal-content {
        background-color: #1e1e1e !important;
        border-top: 1px solid #2d2d2d !important;
      }
      body.dark-mode .modal-input {
        background: #2d2d2d;
        color: white;
        border-color: #444;
      }
      body.dark-mode .btn-cancel {
        background: #2d2d2d;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <!-- Header -->
      <div class="nav-header">
        <a href="dashboard.html"><i class="fa-solid fa-arrow-left"></i></a>
        <span data-i18n="btn_manage_junior">Manage Kids</span>
      </div>

      <!-- Main Content -->
      <div class="content-body">
        <button
          class="add-btn"
          onclick="window.location.href = 'new-account.html'"
        >
          <i class="fa-solid fa-plus"></i>
          <span data-i18n="btn_create_kid">បង្កើតគណនីកូនថ្មី</span>
        </button>
        <div id="juniorCardsContainer"></div>
      </div>

      <!-- Bottom Nav -->
      <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item"
          ><i class="fa-solid fa-house"></i><span>Home</span></a
        >
        <a href="scan.html" class="nav-item"
          ><i class="fa-solid fa-qrcode"></i><span>Scan</span></a
        >
        <a href="history.html" class="nav-item"
          ><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></a
        >
        <a href="settings.html" class="nav-item"
          ><i class="fa-solid fa-gear"></i><span>Settings</span></a
        >
      </div>

      <!-- 🔥 MODALS (ចេញពីក្រោម) 🔥 -->

      <!-- ១. Modal បញ្ចូលប្រាក់ (Top Up) -->
      <div class="custom-modal" id="topupModal" onclick="closeModals(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
          <h3 class="modal-title" id="topupTitle">បញ្ចូលប្រាក់</h3>
          <input
            type="number"
            id="topupAmt"
            class="modal-input"
            placeholder="ចំនួនទឹកប្រាក់ (USD)"
          />
          <input
            type="password"
            id="topupPin"
            class="modal-input"
            placeholder="លេខសម្ងាត់ PIN ៤ខ្ទង់"
            maxlength="4"
          />
          <button class="btn-full" onclick="confirmTopUp()">
            ផ្ទេរឥឡូវនេះ
          </button>
          <button class="btn-full btn-cancel" onclick="closeModals()">
            បោះបង់
          </button>
        </div>
      </div>

      <!-- ២. Modal កំណត់លុយ (Daily Limit) -->
      <div class="custom-modal" id="limitModal" onclick="closeModals(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
          <h3 class="modal-title">កំណត់រនាំងចំណាយប្រចាំថ្ងៃ</h3>
          <p
            style="
              text-align: center;
              color: #64748b;
              font-size: 0.85rem;
              margin-bottom: 15px;
            "
          >
            កំណត់ថាកូនអាចចាយបានប៉ុន្មានក្នុង ១ថ្ងៃ
          </p>
          <input
            type="number"
            id="limitAmt"
            class="modal-input"
            placeholder="ឧទាហរណ៍: 5 (USD)"
          />
          <input
            type="password"
            id="limitPin"
            class="modal-input"
            placeholder="បញ្ជាក់លេខ PIN របស់អ្នក"
            maxlength="4"
          />
          <button
            class="btn-full"
            style="background: #f59e0b"
            onclick="confirmLimit()"
          >
            រក្សាទុក
          </button>
          <button class="btn-full btn-cancel" onclick="closeModals()">
            បោះបង់
          </button>
        </div>
      </div>

      <!-- ៣. Modal ផ្អាកគណនី (Freeze) -->
      <div class="custom-modal" id="freezeModal" onclick="closeModals(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
          <div
            style="
              text-align: center;
              margin-bottom: 15px;
              font-size: 2.5rem;
              color: #ef4444;
            "
          >
            <i class="fa-solid fa-triangle-exclamation"></i>
          </div>
          <h3 class="modal-title" id="freezeTitle">
            តើអ្នកពិតជាចង់ផ្អាកគណនីមែនទេ?
          </h3>
          <input
            type="password"
            id="freezePin"
            class="modal-input"
            placeholder="បញ្ជាក់លេខ PIN របស់អ្នក"
            maxlength="4"
          />
          <button
            class="btn-full btn-danger"
            id="btnConfirmFreeze"
            onclick="confirmFreeze()"
          >
            យល់ព្រមផ្អាក
          </button>
          <button class="btn-full btn-cancel" onclick="closeModals()">
            បោះបង់
          </button>
        </div>
      </div>
    </div>

    <script>
      let currentUser = JSON.parse(
        sessionStorage.getItem("user") || localStorage.getItem("user"),
      );
      let token =
        sessionStorage.getItem("userToken") || localStorage.getItem("token");
      if (!currentUser || !token) window.location.href = "index.html";

      const authHeaders = {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`,
      };

      // អថេរទុកចំណាំថាកំពុងចុចលើកុងកូនមួយណា
      let activeTargetAccount = "";
      let activeTargetFrozen = false;

      function applyTheme() {
        const isDark =
          localStorage.getItem("theme") === "dark" ||
          localStorage.getItem("darkMode_" + currentUser.username) === "true";
        if (isDark) document.body.classList.add("dark-mode");
        else document.body.classList.remove("dark-mode");
      }

      document.addEventListener("DOMContentLoaded", () => {
        applyTheme();
        if (typeof applyLanguage === "function") applyLanguage();
        renderJuniorCards();
        document.body.classList.add("loaded");
      });

      function renderJuniorCards() {
        const container = document.getElementById("juniorCardsContainer");
        const juniorAccounts = (currentUser.subAccounts || []).filter(
          (acc) => acc.accountType === "junior",
        );

        if (juniorAccounts.length === 0) {
          container.innerHTML = `<div style="text-align: center; padding: 40px 20px; color: #64748b;"><i class="fa-solid fa-children" style="font-size: 3rem; color: #cbd5e1; margin-bottom: 15px;"></i><p>អ្នកមិនទាន់មានគណនីកូននៅឡើយទេ!</p></div>`;
          return;
        }

        let html = "";
        juniorAccounts.forEach((acc) => {
          const isFrozen = acc.isLocked || false;
          const statusClass = isFrozen ? "status-frozen" : "status-active";
          const statusText = isFrozen
            ? "🔒 ផ្អាក (Frozen)"
            : "🟢 សកម្ម (Active)";
          const freezeIcon = isFrozen ? "fa-unlock" : "fa-lock";
          const freezeText = isFrozen ? "បើកសោរ" : "ផ្អាក";

          html += `
            <div class="junior-card">
              <div class="status-badge ${statusClass}">${statusText}</div>
              <div class="card-header">
                <div class="profile-icon"><i class="fa-solid fa-child-reaching"></i></div>
                <div class="kid-info">
                  <h3>${acc.accountName}</h3>
                  <p>Acc: ${acc.accountNumber}</p>
                </div>
              </div>
              <div class="balance-box">
                <span class="bal-label">សមតុល្យបច្ចុប្បន្ន</span>
                <span class="bal-amount">$${Number(acc.balance).toFixed(2)}</span>
              </div>
              <div class="action-grid">
                <button class="action-btn btn-topup" onclick="openTopupModal('${acc.accountNumber}', '${acc.accountName}')">
                  <div class="icon-bg"><i class="fa-solid fa-hand-holding-dollar"></i></div><span>បញ្ចូលប្រាក់</span>
                </button>
                <button class="action-btn btn-history" onclick="viewHistory('${acc.accountNumber}')">
                  <div class="icon-bg"><i class="fa-solid fa-clock-rotate-left"></i></div><span>ប្រវត្តិ</span>
                </button>
                <button class="action-btn btn-limit" onclick="openLimitModal('${acc.accountNumber}')">
                  <div class="icon-bg"><i class="fa-solid fa-sliders"></i></div><span>កំណត់លុយ</span>
                </button>
                <button class="action-btn btn-freeze" onclick="openFreezeModal('${acc.accountNumber}', ${isFrozen})">
                  <div class="icon-bg"><i class="fa-solid ${freezeIcon}"></i></div><span>${freezeText}</span>
                </button>
              </div>
            </div>
          `;
        });
        container.innerHTML = html;
      }

      // ==========================================
      // CONTROLLING MODALS (បិទ/បើក ផ្ទាំង)
      // ==========================================
      function closeModals(e) {
        // បើចុចចំ Background ខ្មៅ (e.target.classList.contains) ឱ្យបិទ
        if (e && !e.target.classList.contains("custom-modal")) return;
        document
          .querySelectorAll(".custom-modal")
          .forEach((m) => (m.style.display = "none"));

        // Reset inputs
        document
          .querySelectorAll(".modal-input")
          .forEach((inp) => (inp.value = ""));
      }

      // ១. បញ្ចូលប្រាក់
      function openTopupModal(accNum, name) {
        activeTargetAccount = accNum;
        document.getElementById("topupTitle").innerText =
          `បញ្ចូលប្រាក់ឱ្យ ${name}`;
        document.getElementById("topupModal").style.display = "flex";
      }

      function confirmTopUp() {
        const amt = document.getElementById("topupAmt").value;
        const pin = document.getElementById("topupPin").value;
        if (!amt || !pin) return alert("សូមបំពេញចំនួនទឹកប្រាក់ និង PIN!");

        closeModals();
        Swal.fire({
          title: "កំពុងដំណើរការ...",
          didOpen: () => Swal.showLoading(),
        });

        const reqBody = {
          senderUsername: currentUser.username,
          senderAccount: currentUser.accountNumber,
          receiverAccount: activeTargetAccount,
          amount: amt,
          remark: "Top Up (Junior Account)",
          pin: pin,
          currency: "USD",
        };

        fetch("/api/transaction/transfer", {
          method: "POST",
          headers: authHeaders,
          body: JSON.stringify(reqBody),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.success) {
              Swal.fire({
                icon: "success",
                title: "ជោគជ័យ!",
                timer: 1500,
                showConfirmButton: false,
              }).then(() => location.reload());
            } else Swal.fire("បរាជ័យ", data.message, "error");
          })
          .catch(() => Swal.fire("Error", "បញ្ហាភ្ជាប់ទៅ Server", "error"));
      }

      // ២. មើលប្រវត្តិ
      function viewHistory(accNum) {
        sessionStorage.setItem("viewAccountHistory", accNum);
        window.location.href = "history.html";
      }

      // ៣. កំណត់លុយ
      function openLimitModal(accNum) {
        activeTargetAccount = accNum;
        document.getElementById("limitModal").style.display = "flex";
      }
      function confirmLimit() {
        closeModals();
        Swal.fire(
          "កំពុងអភិវឌ្ឍន៍",
          "មុខងារកំណត់លុយនឹងដំណើរការឆាប់ៗ (រង់ចាំអាប់ដេត Backend)!",
          "info",
        );
      }

      // ៤. ផ្អាកគណនី
      function openFreezeModal(accNum, isFrozen) {
        activeTargetAccount = accNum;
        activeTargetFrozen = isFrozen;

        const title = document.getElementById("freezeTitle");
        const btn = document.getElementById("btnConfirmFreeze");

        if (isFrozen) {
          title.innerText = "តើអ្នកចង់បើកសោរគណនីនេះវិញមែនទេ?";
          btn.innerText = "យល់ព្រមបើកសោរ";
          btn.style.background = "#10b981"; // ពណ៌បៃតង
        } else {
          title.innerText = "តើអ្នកពិតជាចង់ផ្អាកគណនីមែនទេ?";
          btn.innerText = "យល់ព្រមផ្អាក";
          btn.style.background = "#ef4444"; // ពណ៌ក្រហម
        }

        document.getElementById("freezeModal").style.display = "flex";
      }
      function confirmFreeze() {
        closeModals();
        Swal.fire("កំពុងអភិវឌ្ឍន៍", "មុខងារផ្អាកគណនីនឹងដំណើរការឆាប់ៗ!", "info");
      }
    </script>
  </body>
</html>
