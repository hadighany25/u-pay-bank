<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <title>Manage Kids - U-Pay</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Kantumruy+Pro:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/lang.js"></script>
    <script src="js/toast.js"></script>

    <style>
      /* ==========================================
         🚀 CORE STYLES & LAYOUT
         ========================================== */
      body {
        background-color: #f2f4f6;
        margin: 0;
        font-family: "Inter", "Kantumruy Pro", sans-serif;
        visibility: hidden;
        opacity: 0;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        transition:
          opacity 0.4s ease,
          background-color 0.3s ease;
        -webkit-font-smoothing: antialiased;
      }
      body.loaded {
        visibility: visible;
        opacity: 1;
      }

      .app-container {
        width: 100%;
        max-width: 450px;
        background: #f8fafc;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        position: relative;
        padding-bottom: 90px;
      }
      .nav-header {
        padding: 20px;
        background: #004d40;
        color: white;
        display: flex;
        align-items: center;
        gap: 15px;
        font-size: 1.1rem;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .content-body {
        padding: 20px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      /* ==========================================
         👶 JUNIOR CARDS
         ========================================== */
      .add-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        background: #e0f2f1;
        color: #004d40;
        border: 2px dashed #004d40;
        padding: 15px;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 25px;
      }

      .junior-card {
        background: #ffffff;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
        position: relative;
      }
      .status-badge {
        position: absolute;
        top: 15px;
        right: 15px;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .status-active {
        background: #dcfce7;
        color: #10b981;
      }
      .status-frozen {
        background: #fee2e2;
        color: #e11d48;
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 15px;
      }
      .profile-icon {
        width: 50px;
        height: 50px;
        background: #fce7f3;
        color: #db2777;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
      }
      .kid-info h3 {
        font-size: 1.1rem;
        margin-bottom: 4px;
        color: #1e293b;
      }
      .kid-info p {
        font-size: 0.85rem;
        color: #64748b;
      }

      .balance-container {
        background: #f8fafc;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .bal-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .bal-label {
        color: #64748b;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .bal-label img {
        width: 18px;
        border-radius: 50%;
      }
      .bal-amount {
        font-size: 1.2rem;
        font-weight: 700;
        color: #004d40;
      }
      .bal-divider {
        height: 1px;
        background: #e2e8f0;
        width: 100%;
      }

      .action-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .action-btn {
        background: none;
        border: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        color: #64748b;
      }
      .action-btn .icon-bg {
        width: 45px;
        height: 45px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
      }
      .btn-topup .icon-bg {
        background: #ecfdf5;
        color: #10b981;
      }
      .btn-history .icon-bg {
        background: #eff6ff;
        color: #3b82f6;
      }
      .btn-limit .icon-bg {
        background: #fffbeb;
        color: #f59e0b;
      }
      .btn-freeze .icon-bg {
        background: #fef2f2;
        color: #ef4444;
      }

      /* ==========================================
         📱 BOTTOM SHEETS (Higher Height: 75vh)
         ========================================== */
      .sheet-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      .sheet-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }

      .bottom-sheet {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%) translateY(100%);
        width: 100%;
        max-width: 450px;
        height: 75vh; /* ទាញឱ្យខ្ពស់ដល់ 75% នៃកម្ពស់អេក្រង់ */
        background: white;
        border-radius: 24px 24px 0 0;
        z-index: 1001;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .bottom-sheet.active {
        transform: translateX(-50%) translateY(0);
      }

      .sheet-header {
        padding: 20px;
        text-align: center;
        font-weight: 700;
        font-size: 1.2rem;
        border-bottom: 1px solid #f1f5f9;
        position: relative;
        color: #1e293b;
      }
      .sheet-close {
        position: absolute;
        right: 20px;
        top: 20px;
        color: #94a3b8;
        font-size: 1.2rem;
        cursor: pointer;
      }
      .sheet-body {
        padding: 20px;
        overflow-y: auto;
        flex: 1;
      }

      .step-section {
        display: none;
        animation: fadeIn 0.3s ease;
      }
      .step-section.active {
        display: block;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .input-group {
        margin-bottom: 20px;
      }
      .big-input {
        width: 100%;
        padding: 15px;
        font-size: 1.5rem;
        text-align: center;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        outline: none;
        font-weight: 700;
        transition: border-color 0.3s;
        box-sizing: border-box;
      }
      .big-input:focus {
        border-color: #004d40;
      }

      .currency-toggle {
        display: flex;
        background: #f1f5f9;
        border-radius: 12px;
        margin-bottom: 20px;
        padding: 4px;
      }
      .cur-btn {
        flex: 1;
        padding: 10px;
        text-align: center;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        color: #64748b;
        transition: 0.2s;
      }
      .cur-btn.active {
        background: white;
        color: #004d40;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      }

      .trx-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 0;
        border-bottom: 1px solid #f1f5f9;
        cursor: pointer;
      }
      .trx-left {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .trx-icon {
        width: 40px;
        height: 40px;
        background: #e0f2f1;
        color: #004d40;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .trx-title {
        font-weight: 600;
        color: #1e293b;
        font-size: 0.95rem;
      }
      .trx-date {
        font-size: 0.75rem;
        color: #94a3b8;
      }
      .trx-amt {
        font-weight: 700;
        font-size: 1rem;
      }
      .amt-in {
        color: #10b981;
      }
      .amt-out {
        color: #ef4444;
      }

      .btn-primary {
        width: 100%;
        padding: 15px;
        background: #004d40;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div class="nav-header">
        <a href="dashboard.html" style="color: white"
          ><i class="fa-solid fa-arrow-left"></i
        ></a>
        <span>គ្រប់គ្រងគណនីកូន</span>
      </div>

      <div class="content-body">
        <button
          class="add-btn"
          onclick="window.location.href = 'new-account.html'"
        >
          <i class="fa-solid fa-plus"></i> បង្កើតគណនីកូនថ្មី
        </button>
        <div id="juniorCardsContainer"></div>
      </div>
    </div>

    <!-- ⬛ OVERLAY សម្រាប់ Background -->
    <div
      class="sheet-overlay"
      id="sheetOverlay"
      onclick="closeAllSheets()"
    ></div>

    <!-- 📱 TOP UP SHEET -->
    <div class="bottom-sheet" id="topupSheet">
      <div class="sheet-header">
        បញ្ចូលប្រាក់
        <i class="fa-solid fa-xmark sheet-close" onclick="closeAllSheets()"></i>
      </div>
      <div class="sheet-body">
        <div class="step-section active" id="topupStep1">
          <p
            style="text-align: center; color: #64748b; margin-bottom: 15px"
            id="topupToName"
          >
            ផ្ទេរទៅកាន់: ...
          </p>

          <div class="currency-toggle" id="dynamicCurrencyToggle">
            <!-- នឹងត្រូវបាន Render ស្វ័យប្រវត្តិដោយផ្អែកលើប្រភេទគណនី -->
          </div>

          <div class="input-group">
            <input
              type="number"
              id="inputAmount"
              class="big-input"
              placeholder="0.00"
            />
          </div>
          <button class="btn-primary" onclick="goToTopupStep2()">
            បន្ទាប់ <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>

        <div class="step-section" id="topupStep2">
          <p style="text-align: center; color: #64748b; margin-bottom: 15px">
            សូមបញ្ចូលលេខសម្ងាត់ (PIN) ៤ខ្ទង់
          </p>
          <div class="input-group">
            <input
              type="password"
              id="inputPin"
              class="big-input"
              maxlength="4"
              placeholder="••••"
              style="letter-spacing: 15px"
            />
          </div>
          <button class="btn-primary" onclick="submitTopup()">
            បញ្ជាក់ការផ្ទេរ
          </button>
        </div>
      </div>
    </div>

    <!-- 📱 HISTORY SHEET -->
    <div class="bottom-sheet" id="historySheet">
      <div class="sheet-header">
        ប្រវត្តិប្រតិបត្តិការ
        <i class="fa-solid fa-xmark sheet-close" onclick="closeAllSheets()"></i>
      </div>
      <div
        class="sheet-body"
        id="historyListContainer"
        style="padding: 0 20px"
      ></div>
    </div>

    <!-- 📱 SLIP MODAL -->
    <div class="bottom-sheet" id="slipSheet" style="min-height: 70vh">
      <div class="sheet-header">
        វិក្កយបត្រ (Slip)
        <i class="fa-solid fa-xmark sheet-close" onclick="closeSlipSheet()"></i>
      </div>
      <div
        class="sheet-body"
        style="background: #f8fafc; padding: 20px; text-align: center"
      >
        <div
          style="
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
          "
        >
          <i
            class="fa-solid fa-circle-check"
            style="font-size: 3rem; color: #10b981; margin-bottom: 10px"
          ></i>
          <h2 id="slipStatus" style="margin: 0; color: #10b981">ជោគជ័យ</h2>
          <h1
            id="slipAmount"
            style="margin: 15px 0; font-size: 2rem; color: #1e293b"
          >
            $0.00
          </h1>

          <div
            style="
              text-align: left;
              margin-top: 20px;
              font-size: 0.9rem;
              color: #64748b;
            "
          >
            <div
              style="
                display: flex;
                justify-content: space-between;
                margin-bottom: 10px;
              "
            >
              <span>កាលបរិច្ឆេទ:</span>
              <strong id="slipDate" style="color: #1e293b">...</strong>
            </div>
            <div
              style="
                display: flex;
                justify-content: space-between;
                margin-bottom: 10px;
              "
            >
              <span>ប្រតិបត្តិការ:</span>
              <strong id="slipType" style="color: #1e293b">...</strong>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let currentUser = JSON.parse(
        sessionStorage.getItem("user") || localStorage.getItem("user"),
      );
      let token =
        sessionStorage.getItem("userToken") || localStorage.getItem("token");

      let activeChildAccount = "";
      let activeCurrency = "USD";

      document.addEventListener("DOMContentLoaded", () => {
        if (!currentUser) window.location.href = "index.html";
        renderJuniorCards();
        document.body.classList.add("loaded");
        setupEnterKeyListeners();
      });

      // ==========================================
      // ១. គូរ UI កាតកូន (១០០% Dynamic Currency Database Check)
      // ==========================================
      function renderJuniorCards() {
        const container = document.getElementById("juniorCardsContainer");
        const juniorAccounts = (currentUser.subAccounts || []).filter(
          (acc) => acc.accountType === "junior",
        );

        if (juniorAccounts.length === 0) {
          container.innerHTML = `<div style="text-align:center; padding:40px 20px; color:#64748b;"><p>មិនទាន់មានគណនីកូនទេ!</p></div>`;
          return;
        }

        let html = "";
        juniorAccounts.forEach((acc) => {
          const isFrozen = acc.isLocked || false;

          // ឆែកមើល Database ពិតប្រាកដ: បើមាន field balance អោយតម្លៃមកវាគឺមាន USD, បើមាន field balanceKHR គឺមាន KHR
          const hasUSD = !isNaN(parseFloat(acc.balance));
          const hasKHR = !isNaN(parseFloat(acc.balanceKHR));

          // បើ labled តាម currency ផ្ទាល់
          const isOnlyUSD = acc.currency === "USD";
          const isOnlyKHR = acc.currency === "KHR";

          const showUSD = hasUSD || isOnlyUSD;
          const showKHR = hasKHR || isOnlyKHR;

          let balanceHtml = `<div class="balance-container">`;
          if (showUSD) {
            balanceHtml += `
              <div class="bal-row">
                <div class="bal-label"><img src="https://flagcdn.com/w40/us.png" alt="USD"> USD</div>
                <div class="bal-amount">$${Number(acc.balance || 0).toFixed(2)}</div>
              </div>`;
          }
          if (showUSD && showKHR) {
            balanceHtml += `<div class="bal-divider"></div>`;
          }
          if (showKHR) {
            balanceHtml += `
              <div class="bal-row">
                <div class="bal-label"><img src="https://flagcdn.com/w40/kh.png" alt="KHR"> KHR</div>
                <div class="bal-amount">${Number(acc.balanceKHR || 0).toLocaleString()} ៛</div>
              </div>`;
          }
          balanceHtml += `</div>`;

          html += `
            <div class="junior-card">
              <div class="status-badge ${isFrozen ? "status-frozen" : "status-active"}">
                ${isFrozen ? "🔒 បានផ្អាក" : "🟢 សកម្ម"}
              </div>
              
              <div class="card-header">
                <div class="profile-icon"><i class="fa-solid fa-child-reaching"></i></div>
                <div class="kid-info">
                  <h3>${acc.accountName}</h3>
                  <p>Acc: ${acc.accountNumber}</p>
                </div>
              </div>

              ${balanceHtml}

              <div class="action-grid">
                <button class="action-btn btn-topup" onclick="openTopupSheet('${acc.accountNumber}', '${acc.accountName}', ${showUSD}, ${showKHR})">
                  <div class="icon-bg"><i class="fa-solid fa-hand-holding-dollar"></i></div>
                  <span>បញ្ជូលប្រាក់</span>
                </button>
                <button class="action-btn btn-history" onclick="openHistorySheet('${acc.accountNumber}')">
                  <div class="icon-bg"><i class="fa-solid fa-clock-rotate-left"></i></div>
                  <span>ប្រវត្តិ</span>
                </button>
                <button class="action-btn btn-limit" onclick="setDailyLimit('${acc.accountNumber}')">
                  <div class="icon-bg"><i class="fa-solid fa-sliders"></i></div>
                  <span>កំណត់លុយ</span>
                </button>
                <button class="action-btn btn-freeze" onclick="toggleFreeze('${acc.accountNumber}', ${isFrozen})">
                  <div class="icon-bg"><i class="fa-solid ${isFrozen ? "fa-unlock" : "fa-lock"}"></i></div>
                  <span>${isFrozen ? "បើកសោរ" : "ផ្អាក"}</span>
                </button>
              </div>
            </div>
          `;
        });
        container.innerHTML = html;
      }

      // ==========================================
      // ២. BOTTOM SHEETS & ការវេរលុយពិតប្រាកដ (Full Flow)
      // ==========================================
      function closeAllSheets() {
        document
          .querySelectorAll(".bottom-sheet")
          .forEach((el) => el.classList.remove("active"));
        document.getElementById("sheetOverlay").classList.remove("active");
        document.getElementById("inputAmount").value = "";
        document.getElementById("inputPin").value = "";
        document.getElementById("topupStep1").classList.add("active");
        document.getElementById("topupStep2").classList.remove("active");
      }

      function openTopupSheet(accNum, name, hasUSD, hasKHR) {
        activeChildAccount = accNum;
        document.getElementById("topupToName").innerText =
          `ផ្ទេរទៅកាន់: ${name}`;

        // រៀបចំប៊ូតុងរើសលុយ តាមទិន្នន័យពិត
        const toggleContainer = document.getElementById(
          "dynamicCurrencyToggle",
        );
        toggleContainer.innerHTML = "";
        if (hasUSD) {
          toggleContainer.innerHTML += `<div class="cur-btn active" id="btnCurUSD" onclick="setCurrency('USD')">USD ($)</div>`;
          activeCurrency = "USD";
        }
        if (hasKHR) {
          const isActive = !hasUSD ? "active" : "";
          toggleContainer.innerHTML += `<div class="cur-btn ${isActive}" id="btnCurKHR" onclick="setCurrency('KHR')">KHR (៛)</div>`;
          if (!hasUSD) activeCurrency = "KHR";
        }

        document.getElementById("sheetOverlay").classList.add("active");
        document.getElementById("topupSheet").classList.add("active");
        setTimeout(() => document.getElementById("inputAmount").focus(), 350);
      }

      function setCurrency(cur) {
        activeCurrency = cur;
        const btnUSD = document.getElementById("btnCurUSD");
        const btnKHR = document.getElementById("btnCurKHR");
        if (btnUSD) btnUSD.classList.toggle("active", cur === "USD");
        if (btnKHR) btnKHR.classList.toggle("active", cur === "KHR");
        document.getElementById("inputAmount").focus();
      }

      function goToTopupStep2() {
        const amt = document.getElementById("inputAmount").value;
        if (!amt || amt <= 0) {
          Swal.fire({
            toast: true,
            position: "top",
            icon: "error",
            title: "សូមបញ្ចូលចំនួនប្រាក់!",
            showConfirmButton: false,
            timer: 1500,
          });
          return;
        }
        document.getElementById("topupStep1").classList.remove("active");
        document.getElementById("topupStep2").classList.add("active");
        setTimeout(() => document.getElementById("inputPin").focus(), 350);
      }

      // 🔥 ការផ្ទេរប្រាក់ពិតប្រាកដ និង Optimistic Update UI (ទោះ Server យឺតក៏ UI លោតភ្លាមៗ)
      function submitTopup() {
        const amt = parseFloat(document.getElementById("inputAmount").value);
        const pin = document.getElementById("inputPin").value;

        if (pin.length < 4) return;
        Swal.fire({
          title: "កំពុងដំណើរការ...",
          didOpen: () => Swal.showLoading(),
        });

        // ឆែកមើលគណនីមេតាមរូបិយប័ណ្ណ
        const senderAcc =
          activeCurrency === "KHR" && currentUser.accountNumberKHR
            ? currentUser.accountNumberKHR
            : currentUser.accountNumber;

        const reqBody = {
          senderUsername: currentUser.username,
          senderAccount: senderAcc,
          receiverAccount: activeChildAccount,
          amount: amt,
          currency: activeCurrency,
          remark: "ប៉ាម៉ាក់ផ្ទេរប្រាក់ឱ្យ",
          pin: pin,
        };

        fetch("/api/transaction/transfer", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify(reqBody),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.success) {
              // 💡 OPTIMISTIC UI UPDATE: Update ទិន្នន័យក្នុង Storage ដោយខ្លួនឯងភ្លាមៗ ដើម្បីឱ្យ UI រត់លឿន
              if (data.user) {
                // បើ Backend បោះ User Update មកអោយ យកតាមវា
                currentUser = data.user;
              } else {
                // បើ Backend អត់បោះអោយទេ យើង Update ខ្លួនឯងភ្លាមៗកុំអោយគាំង
                if (activeCurrency === "USD") {
                  currentUser.balance = parseFloat(currentUser.balance) - amt;
                  let targetAcc = currentUser.subAccounts.find(
                    (a) => a.accountNumber === activeChildAccount,
                  );
                  if (targetAcc)
                    targetAcc.balance = (
                      parseFloat(targetAcc.balance || 0) + amt
                    ).toFixed(2);
                } else {
                  currentUser.balanceKHR =
                    parseFloat(currentUser.balanceKHR || 0) - amt;
                  let targetAcc = currentUser.subAccounts.find(
                    (a) => a.accountNumber === activeChildAccount,
                  );
                  if (targetAcc)
                    targetAcc.balanceKHR = (
                      parseFloat(targetAcc.balanceKHR || 0) + amt
                    ).toString();
                }

                // កត់ត្រាចូលប្រវត្តិភ្លាមៗ
                if (!currentUser.transactions) currentUser.transactions = [];
                currentUser.transactions.unshift({
                  transactionId: data.transactionId || "TRX" + Date.now(),
                  senderAccount: senderAcc,
                  receiverAccount: activeChildAccount,
                  amount: amt,
                  currency: activeCurrency,
                  remark: "ប៉ាម៉ាក់ផ្ទេរប្រាក់ឱ្យ",
                  date: new Date().toLocaleString(),
                });
              }

              sessionStorage.setItem("user", JSON.stringify(currentUser));

              Swal.fire({
                icon: "success",
                title: "ជោគជ័យ!",
                text: "លុយបានផ្ទេរចូលគណនីកូនរួចរាល់",
                timer: 1500,
                showConfirmButton: false,
                customClass: { popup: "premium-swal" },
              }).then(() => {
                closeAllSheets();
                renderJuniorCards(); // គូរ UI ថ្មីដោយមិនបាច់ Refresh នាំឲ្យទាក់
              });
            } else {
              Swal.fire({ icon: "error", title: "បរាជ័យ", text: data.message });
              document.getElementById("inputPin").value = ""; // Reset PIN អោយវាយម្តងទៀត
            }
          })
          .catch((err) => {
            Swal.fire("Error", "បញ្ហាភ្ជាប់ទៅ Server", "error");
          });
      }

      function setupEnterKeyListeners() {
        document
          .getElementById("inputAmount")
          .addEventListener("keyup", (e) => {
            if (e.key === "Enter") goToTopupStep2();
          });
        document.getElementById("inputPin").addEventListener("keyup", (e) => {
          if (e.key === "Enter") submitTopup();
          if (e.target.value.length === 4) {
            setTimeout(submitTopup, 200);
          }
        });
      }

      // ==========================================
      // ៣. ប្រវត្តិប្រតិបត្តិការ & Slip (Fixed Filter)
      // ==========================================
      function openHistorySheet(accNum) {
        document.getElementById("sheetOverlay").classList.add("active");
        document.getElementById("historySheet").classList.add("active");

        const container = document.getElementById("historyListContainer");

        // ឆែកមើល History របស់ User រួច Filter យកតែលេខកុងកូន
        const trxs = (currentUser.transactions || []).filter(
          (t) =>
            String(t.receiverAccount) === String(accNum) ||
            String(t.senderAccount) === String(accNum) ||
            String(t.toAccount) === String(accNum) || // Fallback if backend uses different name
            String(t.fromAccount) === String(accNum),
        );

        if (trxs.length === 0) {
          container.innerHTML = `<p style="text-align:center; padding:20px; color:#94a3b8;">មិនទាន់មានប្រវត្តិប្រតិបត្តិការទេ</p>`;
          return;
        }

        let html = "";
        trxs.forEach((t) => {
          // បើគណនីកូនជាអ្នកទទួល (receiver) បានន័យថាជាការបូកចូល (Income)
          const isIncome =
            String(t.receiverAccount) === String(accNum) ||
            String(t.toAccount) === String(accNum);
          const amtColor = isIncome ? "amt-in" : "amt-out";
          const symbol = isIncome ? "+" : "-";
          const icon = isIncome ? "fa-arrow-down" : "fa-arrow-up";

          html += `
            <div class="trx-item" onclick="openSlip('${t.transactionId || ""}', '${t.amount}', '${t.currency}', '${t.date}', '${t.remark}')">
              <div class="trx-left">
                <div class="trx-icon"><i class="fa-solid ${icon}"></i></div>
                <div>
                  <div class="trx-title">${t.remark || (isIncome ? "ទទួលប្រាក់" : "ផ្ទេរប្រាក់")}</div>
                  <div class="trx-date">${t.date || "Today"}</div>
                </div>
              </div>
              <div class="trx-amt ${amtColor}">${symbol}${t.currency === "USD" ? "$" : ""}${t.amount}${t.currency === "KHR" ? " ៛" : ""}</div>
            </div>
          `;
        });
        container.innerHTML = html;
      }

      function openSlip(id, amount, cur, date, remark) {
        document.getElementById("historySheet").classList.remove("active");
        document.getElementById("slipSheet").classList.add("active");

        document.getElementById("slipAmount").innerText =
          `${cur === "USD" ? "$" : ""}${amount}${cur === "KHR" ? " ៛" : ""}`;
        document.getElementById("slipDate").innerText =
          date || new Date().toLocaleString();
        document.getElementById("slipType").innerText =
          remark || "ប្រតិបត្តិការ";
      }

      function closeSlipSheet() {
        document.getElementById("slipSheet").classList.remove("active");
        document.getElementById("sheetOverlay").classList.remove("active");
      }

      // ==========================================
      // 📊 កំណត់រនាំងចំណាយ (Daily Limit)
      // ==========================================
      function setDailyLimit(accNum) {
        Swal.fire({
          title: "កំណត់រនាំងចំណាយប្រចាំថ្ងៃ",
          html: `
            <p style="font-size:0.9rem; color:#64748b; margin-bottom:10px;">កំណត់ថាកូនអាចចាយបានប៉ុន្មានក្នុង ១ថ្ងៃ</p>
            <input type="number" id="limit" class="swal2-input" placeholder="ឧទាហរណ៍: 5 (USD)">
            <input type="password" id="limitPin" class="swal2-input" placeholder="លេខសម្ងាត់ PIN របស់អ្នក" maxlength="4" style="letter-spacing: 5px;">
          `,
          confirmButtonText: "រក្សាទុក",
          confirmButtonColor: "#f59e0b",
          showCancelButton: true,
          customClass: { popup: "premium-swal" },
          preConfirm: () => {
            const limit = document.getElementById("limit").value;
            const pin = document.getElementById("limitPin").value;
            if (!limit || !pin)
              Swal.showValidationMessage("សូមបំពេញចំនួនលុយ និង PIN!");
            return { limit, pin };
          },
        }).then((result) => {
          if (result.isConfirmed) {
            Swal.fire({
              title: "កំពុងដំណើរការ...",
              didOpen: () => Swal.showLoading(),
            });

            fetch("/api/account/junior/update-limit", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify({
                parentUsername: currentUser.username,
                childAccountNumber: accNum,
                pin: result.value.pin,
                dailyLimit: result.value.limit,
              }),
            })
              .then((res) => res.json())
              .then((data) => {
                if (data.success) {
                  Swal.fire({
                    icon: "success",
                    title: "ជោគជ័យ!",
                    text: data.message,
                    timer: 1500,
                    showConfirmButton: false,
                  });
                } else {
                  Swal.fire({
                    icon: "error",
                    title: "បរាជ័យ",
                    text: data.message,
                  });
                }
              })
              .catch(() => Swal.fire("Error", "បញ្ហាភ្ជាប់ទៅ Server", "error"));
          }
        });
      }

      // ==========================================
      // 🔒 ផ្អាកគណនី (Freeze/Unfreeze)
      // ==========================================
      function toggleFreeze(accNum, currentFrozenStatus) {
        const isFrozen = !currentFrozenStatus; // ប្តូរពី ពិត ទៅ មិនពិត ឬ ផ្ទុយមកវិញ
        const actionText = isFrozen ? "ផ្អាក" : "បើកសោរ";
        const confirmColor = isFrozen ? "#ef4444" : "#10b981";

        Swal.fire({
          title: `តើអ្នកពិតជាចង់ ${actionText} គណនីនេះមែនទេ?`,
          html: `<input type="password" id="freezePin" class="swal2-input" placeholder="បញ្ជាក់ PIN របស់អ្នក" maxlength="4" style="letter-spacing: 5px;">`,
          icon: "warning",
          showCancelButton: true,
          confirmButtonText: `យល់ព្រម ${actionText}`,
          confirmButtonColor: confirmColor,
          customClass: { popup: "premium-swal" },
          preConfirm: () => {
            const pin = document.getElementById("freezePin").value;
            if (!pin) Swal.showValidationMessage("សូមបញ្ចូល PIN!");
            return pin;
          },
        }).then((result) => {
          if (result.isConfirmed) {
            Swal.fire({
              title: "កំពុងដំណើរការ...",
              didOpen: () => Swal.showLoading(),
            });

            fetch("/api/account/junior/toggle-freeze", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify({
                parentUsername: currentUser.username,
                childAccountNumber: accNum,
                pin: result.value,
                isFrozen: isFrozen,
              }),
            })
              .then((res) => res.json())
              .then((data) => {
                if (data.success) {
                  // Update ក្នុង Storage ភ្លាមៗ ដើម្បីកុំអោយគាំង
                  if (data.user) {
                    sessionStorage.setItem("user", JSON.stringify(data.user));
                    currentUser = data.user;
                  }
                  Swal.fire({
                    icon: "success",
                    title: "ជោគជ័យ!",
                    text: data.message,
                    timer: 1500,
                    showConfirmButton: false,
                  }).then(() => renderJuniorCards()); // គូរ UI កាតកូនម្តងទៀត
                } else {
                  Swal.fire({
                    icon: "error",
                    title: "បរាជ័យ",
                    text: data.message,
                  });
                }
              })
              .catch(() => Swal.fire("Error", "បញ្ហាភ្ជាប់ទៅ Server", "error"));
          }
        });
      }
    </script>
  </body>
