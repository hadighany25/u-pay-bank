<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <title>Manage Kids - U-Pay</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Kantumruy+Pro:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/lang.js"></script>
    <script src="js/toast.js"></script>

    <style>
      /* ==========================================
         🚀 CORE STYLES & LAYOUT
         ========================================== */
      body {
        background-color: #f2f4f6;
        margin: 0;
        font-family: "Inter", "Kantumruy Pro", sans-serif;
        visibility: hidden;
        opacity: 0;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        transition:
          opacity 0.4s ease,
          background-color 0.3s ease;
        -webkit-font-smoothing: antialiased;
      }
      body.loaded {
        visibility: visible;
        opacity: 1;
      }

      .app-container {
        width: 100%;
        max-width: 450px;
        background: #f8fafc;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        position: relative;
        padding-bottom: 90px;
      }
      .nav-header {
        padding: 20px;
        background: #004d40;
        color: white;
        display: flex;
        align-items: center;
        gap: 15px;
        font-size: 1.1rem;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .content-body {
        padding: 20px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      /* ==========================================
         👶 JUNIOR CARDS & MULTI-CURRENCY
         ========================================== */
      .add-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        background: #e0f2f1;
        color: #004d40;
        border: 2px dashed #004d40;
        padding: 15px;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 25px;
      }

      .junior-card {
        background: #ffffff;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
        position: relative;
      }
      .status-badge {
        position: absolute;
        top: 15px;
        right: 15px;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .status-active {
        background: #dcfce7;
        color: #10b981;
      }
      .status-frozen {
        background: #fee2e2;
        color: #e11d48;
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 15px;
      }
      .profile-icon {
        width: 50px;
        height: 50px;
        background: #fce7f3;
        color: #db2777;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
      }
      .kid-info h3 {
        font-size: 1.1rem;
        margin-bottom: 4px;
        color: #1e293b;
      }
      .kid-info p {
        font-size: 0.85rem;
        color: #64748b;
      }

      /* Multi-Currency Box */
      .balance-container {
        background: #f8fafc;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .bal-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .bal-label {
        color: #64748b;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .bal-label img {
        width: 18px;
        border-radius: 50%;
      }
      .bal-amount {
        font-size: 1.2rem;
        font-weight: 700;
        color: #004d40;
      }
      .bal-divider {
        height: 1px;
        background: #e2e8f0;
        width: 100%;
      }

      /* Actions Grid */
      .action-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .action-btn {
        background: none;
        border: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        color: #64748b;
      }
      .action-btn .icon-bg {
        width: 45px;
        height: 45px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
      }
      .btn-topup .icon-bg {
        background: #ecfdf5;
        color: #10b981;
      }
      .btn-history .icon-bg {
        background: #eff6ff;
        color: #3b82f6;
      }
      .btn-limit .icon-bg {
        background: #fffbeb;
        color: #f59e0b;
      }
      .btn-freeze .icon-bg {
        background: #fef2f2;
        color: #ef4444;
      }

      /* ==========================================
         📱 BOTTOM SHEETS (HALF SCREEN MODALS)
         ========================================== */
      .sheet-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      .sheet-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }

      .bottom-sheet {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%) translateY(100%);
        width: 100%;
        max-width: 450px;
        min-height: 70vh;
        max-height: 85vh; /* ដំឡើងកម្ពស់ត្រង់នេះ */
        background: white;
        border-radius: 24px 24px 0 0;
        z-index: 1001;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .bottom-sheet.active {
        transform: translateX(-50%) translateY(0);
      }

      .sheet-header {
        padding: 20px;
        text-align: center;
        font-weight: 700;
        font-size: 1.2rem;
        border-bottom: 1px solid #f1f5f9;
        position: relative;
        color: #1e293b;
      }
      .sheet-close {
        position: absolute;
        right: 20px;
        top: 20px;
        color: #94a3b8;
        font-size: 1.2rem;
        cursor: pointer;
      }
      .sheet-body {
        padding: 20px;
        overflow-y: auto;
        flex: 1;
      }

      /* Step Inputs (For TopUp, Limit) */
      .step-section {
        display: none;
        animation: fadeIn 0.3s ease;
      }
      .step-section.active {
        display: block;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .input-group {
        margin-bottom: 20px;
      }
      .input-group label {
        display: block;
        margin-bottom: 8px;
        color: #64748b;
        font-size: 0.9rem;
      }
      .big-input {
        width: 100%;
        padding: 15px;
        font-size: 1.5rem;
        text-align: center;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        outline: none;
        font-weight: 700;
        transition: border-color 0.3s;
        box-sizing: border-box;
      }
      .big-input:focus {
        border-color: #004d40;
      }
      .currency-toggle {
        display: flex;
        background: #f1f5f9;
        border-radius: 12px;
        margin-bottom: 20px;
        padding: 4px;
      }
      .cur-btn {
        flex: 1;
        padding: 10px;
        text-align: center;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        color: #64748b;
        transition: 0.2s;
      }
      .cur-btn.active {
        background: white;
        color: #004d40;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      }

      /* History List in Bottom Sheet */
      .trx-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 0;
        border-bottom: 1px solid #f1f5f9;
        cursor: pointer;
      }
      .trx-left {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .trx-icon {
        width: 40px;
        height: 40px;
        background: #e0f2f1;
        color: #004d40;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .trx-title {
        font-weight: 600;
        color: #1e293b;
        font-size: 0.95rem;
      }
      .trx-date {
        font-size: 0.75rem;
        color: #94a3b8;
      }
      .trx-amt {
        font-weight: 700;
        font-size: 1rem;
      }
      .amt-in {
        color: #10b981;
      }
      .amt-out {
        color: #ef4444;
      }

      /* Primary Button */
      .btn-primary {
        width: 100%;
        padding: 15px;
        background: #004d40;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
      }

      /* ==========================================
         🌙 DARK MODE OVERRIDES (Optional)
         ========================================== */
      body.dark-mode {
        background-color: #000000 !important;
      }
      body.dark-mode .app-container {
        background-color: #121212 !important;
      }
      body.dark-mode .junior-card {
        background: #1e1e1e !important;
        border-color: #2d2d2d !important;
      }
      body.dark-mode .balance-container {
        background: #2d2d2d !important;
      }
      body.dark-mode .bottom-sheet {
        background: #1e1e1e !important;
      }
      body.dark-mode .sheet-header {
        color: white;
        border-color: #2d2d2d;
      }
      body.dark-mode .big-input {
        background: #121212;
        color: white;
        border-color: #333;
      }
      body.dark-mode .trx-item {
        border-color: #2d2d2d;
      }
      body.dark-mode .trx-title {
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div class="nav-header">
        <a href="dashboard.html" style="color: white"
          ><i class="fa-solid fa-arrow-left"></i
        ></a>
        <span>Manage Kids</span>
      </div>

      <div class="content-body">
        <button
          class="add-btn"
          onclick="window.location.href = 'new-account.html'"
        >
          <i class="fa-solid fa-plus"></i> បង្កើតគណនីកូនថ្មី
        </button>
        <div id="juniorCardsContainer"></div>
      </div>
    </div>

    <!-- ⬛ OVERLAY សម្រាប់ Background -->
    <div
      class="sheet-overlay"
      id="sheetOverlay"
      onclick="closeAllSheets()"
    ></div>

    <!-- 📱 BOTTOM SHEET 1: បញ្ចូលប្រាក់ (Top Up) -->
    <div class="bottom-sheet" id="topupSheet">
      <div class="sheet-header">
        បញ្ចូលប្រាក់
        <i class="fa-solid fa-xmark sheet-close" onclick="closeAllSheets()"></i>
      </div>
      <div class="sheet-body">
        <!-- ជំហានទី ១: បញ្ចូលទឹកប្រាក់ (Amount) -->
        <div class="step-section active" id="topupStep1">
          <p
            style="text-align: center; color: #64748b; margin-bottom: 15px"
            id="topupToName"
          >
            ផ្ទេរទៅកាន់: ...
          </p>

          <div class="currency-toggle" id="currencyToggleBox">
            <div
              class="cur-btn active"
              id="btnCurUSD"
              onclick="setCurrency('USD')"
            >
              USD ($)
            </div>
            <div class="cur-btn" id="btnCurKHR" onclick="setCurrency('KHR')">
              KHR (៛)
            </div>
          </div>

          <div class="input-group">
            <input
              type="number"
              id="inputAmount"
              class="big-input"
              placeholder="0.00"
            />
          </div>
          <button class="btn-primary" onclick="goToTopupStep2()">
            បន្ទាប់ <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>

        <!-- ជំហានទី ២: លេខសម្ងាត់ (PIN) -->
        <div class="step-section" id="topupStep2">
          <p style="text-align: center; color: #64748b; margin-bottom: 15px">
            សូមបញ្ចូលលេខសម្ងាត់ (PIN) ៤ខ្ទង់
          </p>
          <div class="input-group">
            <input
              type="password"
              id="inputPin"
              class="big-input"
              maxlength="4"
              placeholder="••••"
              style="letter-spacing: 15px"
            />
          </div>
          <button
            class="btn-primary"
            id="btnSubmitTransfer"
            onclick="submitTopup()"
          >
            បញ្ជាក់ការផ្ទេរ
          </button>
        </div>
      </div>
    </div>

    <!-- 📱 BOTTOM SHEET 2: ប្រវត្តិ (History) -->
    <div class="bottom-sheet" id="historySheet">
      <div class="sheet-header">
        ប្រវត្តិប្រតិបត្តិការ
        <i class="fa-solid fa-xmark sheet-close" onclick="closeAllSheets()"></i>
      </div>
      <div class="sheet-body" id="historyListContainer" style="padding: 0 20px">
        <!-- Data rendered here -->
      </div>
    </div>

    <!-- 📱 SLIP MODAL (នៅពេលចុចលើប្រវត្តិ) -->
    <div class="bottom-sheet" id="slipSheet" style="min-height: 75vh">
      <div class="sheet-header">
        វិក្កយបត្រ (Slip)
        <i class="fa-solid fa-xmark sheet-close" onclick="closeSlipSheet()"></i>
      </div>
      <div
        class="sheet-body"
        style="background: #f8fafc; padding: 20px; text-align: center"
      >
        <!-- UI វិក្កយបត្រកាត់ខ្លីៗ -->
        <div
          style="
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
          "
        >
          <i
            class="fa-solid fa-circle-check"
            style="font-size: 3rem; color: #10b981; margin-bottom: 10px"
          ></i>
          <h2 id="slipStatus" style="margin: 0; color: #10b981">ជោគជ័យ</h2>
          <h1
            id="slipAmount"
            style="margin: 15px 0; font-size: 2rem; color: #1e293b"
          >
            $0.00
          </h1>

          <div
            style="
              text-align: left;
              margin-top: 20px;
              font-size: 0.9rem;
              color: #64748b;
            "
          >
            <div
              style="
                display: flex;
                justify-content: space-between;
                margin-bottom: 10px;
              "
            >
              <span>កាលបរិច្ឆេទ:</span>
              <strong id="slipDate" style="color: #1e293b">...</strong>
            </div>
            <div
              style="
                display: flex;
                justify-content: space-between;
                margin-bottom: 10px;
              "
            >
              <span>ប្រតិបត្តិការ:</span>
              <strong id="slipType" style="color: #1e293b">...</strong>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let currentUser = JSON.parse(
        sessionStorage.getItem("user") || localStorage.getItem("user"),
      );
      let token =
        sessionStorage.getItem("userToken") || localStorage.getItem("token");
      let activeChildAccount = "";
      let activeCurrency = "USD";

      const authHeaders = {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`,
      };

      document.addEventListener("DOMContentLoaded", () => {
        if (!currentUser) window.location.href = "index.html";
        applyTheme();
        renderJuniorCards();
        document.body.classList.add("loaded");
        setupEnterKeyListeners();
      });

      function applyTheme() {
        if (
          localStorage.getItem("theme") === "dark" ||
          localStorage.getItem("darkMode_" + currentUser.username) === "true"
        ) {
          document.body.classList.add("dark-mode");
        }
      }

      // ==========================================
      // ១. គូរ UI កាតកូន (Dynamic Currency)
      // ==========================================
      function renderJuniorCards() {
        const container = document.getElementById("juniorCardsContainer");
        const juniorAccounts = (currentUser.subAccounts || []).filter(
          (acc) => acc.accountType === "junior",
        );

        if (juniorAccounts.length === 0) {
          container.innerHTML = `<div style="text-align:center; padding:40px 20px; color:#64748b;"><p>មិនទាន់មានគណនីកូនទេ!</p></div>`;
          return;
        }

        let html = "";
        juniorAccounts.forEach((acc) => {
          const isFrozen = acc.isLocked || false;

          // ឆែកមើលថាកុងកូនមានលុយដុល្លារឬខ្មែរ (Dynamic check)
          const hasUSD = acc.balance !== undefined && acc.balance !== null;
          const hasKHR =
            acc.balanceKHR !== undefined && acc.balanceKHR !== null;

          let currencyHtml = "";
          if (hasUSD) {
            currencyHtml += `
              <div class="bal-row">
                <div class="bal-label">
                  <img src="https://flagcdn.com/w40/us.png" alt="USD"> USD
                </div>
                <div class="bal-amount">$${Number(acc.balance).toFixed(2)}</div>
              </div>
            `;
          }
          if (hasUSD && hasKHR) {
            currencyHtml += `<div class="bal-divider"></div>`;
          }
          if (hasKHR) {
            currencyHtml += `
              <div class="bal-row">
                <div class="bal-label">
                  <img src="https://flagcdn.com/w40/kh.png" alt="KHR"> KHR
                </div>
                <div class="bal-amount">${Number(acc.balanceKHR).toLocaleString()} ៛</div>
              </div>
            `;
          }

          html += `
            <div class="junior-card">
              <div class="status-badge ${isFrozen ? "status-frozen" : "status-active"}">
                ${isFrozen ? "🔒 បានផ្អាក" : "🟢 សកម្ម"}
              </div>
              
              <div class="card-header">
                <div class="profile-icon"><i class="fa-solid fa-child-reaching"></i></div>
                <div class="kid-info">
                  <h3>${acc.accountName}</h3>
                  <p>Acc: ${acc.accountNumber}</p>
                </div>
              </div>

              <!-- Dynamic Multi-Currency Display -->
              <div class="balance-container">
                ${currencyHtml}
              </div>

              <!-- Action Buttons -->
              <div class="action-grid">
                <button class="action-btn btn-topup" onclick="openTopupSheet('${acc.accountNumber}', '${acc.accountName}')">
                  <div class="icon-bg"><i class="fa-solid fa-hand-holding-dollar"></i></div>
                  <span>បញ្ជូលប្រាក់</span>
                </button>
                <button class="action-btn btn-history" onclick="openHistorySheet('${acc.accountNumber}')">
                  <div class="icon-bg"><i class="fa-solid fa-clock-rotate-left"></i></div>
                  <span>ប្រវត្តិ</span>
                </button>
                <button class="action-btn btn-limit" onclick="developmentAlert()">
                  <div class="icon-bg"><i class="fa-solid fa-sliders"></i></div>
                  <span>កំណត់លុយ</span>
                </button>
                <button class="action-btn btn-freeze" onclick="developmentAlert()">
                  <div class="icon-bg"><i class="fa-solid fa-lock"></i></div>
                  <span>ផ្អាក</span>
                </button>
              </div>
            </div>
          `;
        });
        container.innerHTML = html;
      }

      // ==========================================
      // ២. មុខងារ BOTTOM SHEETS & Auto Focus/Enter
      // ==========================================
      function closeAllSheets() {
        document
          .querySelectorAll(".bottom-sheet")
          .forEach((el) => el.classList.remove("active"));
        document.getElementById("sheetOverlay").classList.remove("active");

        // Reset Inputs
        document.getElementById("inputAmount").value = "";
        document.getElementById("inputPin").value = "";
        document.getElementById("topupStep1").classList.add("active");
        document.getElementById("topupStep2").classList.remove("active");
      }

      function openTopupSheet(accNum, name) {
        activeChildAccount = accNum;
        document.getElementById("topupToName").innerText =
          `ផ្ទេរទៅកាន់: ${name}`;

        // ឆែកមើលថាកុងកូនអាចទទួលលុយអីបានខ្លះ ដើម្បីបង្ហាញប៊ូតុងរើសលុយឱ្យត្រូវ
        const childAcc = currentUser.subAccounts.find(
          (a) => String(a.accountNumber) === String(accNum),
        );
        const hasUSD =
          childAcc.balance !== undefined && childAcc.balance !== null;
        const hasKHR =
          childAcc.balanceKHR !== undefined && childAcc.balanceKHR !== null;

        const btnUSD = document.getElementById("btnCurUSD");
        const btnKHR = document.getElementById("btnCurKHR");
        const toggleBox = document.getElementById("currencyToggleBox");

        // បិទ/បើកប៊ូតុងលុយតាមទិន្នន័យជាក់ស្តែង
        btnUSD.style.display = hasUSD ? "block" : "none";
        btnKHR.style.display = hasKHR ? "block" : "none";

        // លាក់ប្រអប់រើសលុយតែម្តង បើមានតែ១ជម្រើស
        if ((hasUSD && !hasKHR) || (!hasUSD && hasKHR)) {
          toggleBox.style.display = "none";
        } else {
          toggleBox.style.display = "flex";
        }

        // Auto select currency
        if (hasUSD) setCurrency("USD");
        else if (hasKHR) setCurrency("KHR");

        document.getElementById("sheetOverlay").classList.add("active");
        document.getElementById("topupSheet").classList.add("active");

        // Auto-focus after animation
        setTimeout(() => document.getElementById("inputAmount").focus(), 350);
      }

      function setCurrency(cur) {
        activeCurrency = cur;
        document
          .getElementById("btnCurUSD")
          .classList.toggle("active", cur === "USD");
        document
          .getElementById("btnCurKHR")
          .classList.toggle("active", cur === "KHR");
        document.getElementById("inputAmount").focus();
      }

      function goToTopupStep2() {
        const amt = document.getElementById("inputAmount").value;
        if (!amt || amt <= 0) {
          Swal.fire({
            toast: true,
            position: "top",
            icon: "error",
            title: "សូមបញ្ចូលចំនួនប្រាក់!",
            showConfirmButton: false,
            timer: 1500,
          });
          return;
        }
        document.getElementById("topupStep1").classList.remove("active");
        document.getElementById("topupStep2").classList.add("active");

        setTimeout(() => document.getElementById("inputPin").focus(), 350);
      }

      function submitTopup() {
        const amt = document.getElementById("inputAmount").value;
        const pin = document.getElementById("inputPin").value;
        if (pin.length < 4) {
          return; // ទុកឱ្យវាយឱ្យគ្រប់ ៤សិន
        }

        // ការពារការចុចជាប់ៗគ្នា (Double Click)
        document.getElementById("btnSubmitTransfer").disabled = true;
        Swal.fire({
          title: "កំពុងដំណើរការ...",
          didOpen: () => Swal.showLoading(),
        });

        const reqBody = {
          senderUsername: currentUser.username,
          senderAccount: currentUser.accountNumber, // កាត់ពីគណនីមេ (ប៉ាម៉ាក់)
          receiverAccount: activeChildAccount, // ចូលគណនីកូន
          amount: Number(amt),
          currency: activeCurrency,
          remark: "បញ្ចូលប្រាក់ឱ្យកូន",
          pin: pin,
        };

        // តភ្ជាប់ទៅ API ពិតប្រាកដដែលយើងបានសរសេរពីមុន
        fetch("/api/transaction/transfer", {
          method: "POST",
          headers: authHeaders,
          body: JSON.stringify(reqBody),
        })
          .then((res) => res.json())
          .then((data) => {
            document.getElementById("btnSubmitTransfer").disabled = false;
            if (data.success) {
              Swal.fire({
                icon: "success",
                title: "ជោគជ័យ!",
                text: "ប្រាក់ត្រូវបានផ្ទេរចូលគណនីកូនរូចរាល់!",
                confirmButtonColor: "#10b981",
                customClass: { popup: "premium-swal" },
              }).then(() => {
                closeAllSheets();
                // Refresh ផេកដើម្បីទាញយកសមតុល្យលុយថ្មីបំផុតពី Database
                window.location.reload();
              });
            } else {
              Swal.fire({
                icon: "error",
                title: "បរាជ័យ",
                text: data.message || "មិនអាចផ្ទេរប្រាក់បានទេ!",
                confirmButtonColor: "#ef4444",
                customClass: { popup: "premium-swal" },
              }).then(() => {
                // បើវាយ PIN ខុស លុបចោលហើយឱ្យវាយម្តងទៀត
                document.getElementById("inputPin").value = "";
                document.getElementById("inputPin").focus();
              });
            }
          })
          .catch((err) => {
            document.getElementById("btnSubmitTransfer").disabled = false;
            Swal.fire("Error", "មានបញ្ហាភ្ជាប់ទៅកាន់ Server!", "error");
          });
      }

      // ចាប់យក Keyboard Event (ចុច Enter ទៅមុខដោយស្វ័យប្រវត្តិ)
      function setupEnterKeyListeners() {
        document
          .getElementById("inputAmount")
          .addEventListener("keyup", (e) => {
            if (e.key === "Enter") goToTopupStep2();
          });

        document.getElementById("inputPin").addEventListener("input", (e) => {
          // Auto submit ពេលវាយពេញ ៤ខ្ទង់ (មិនបាច់ចាំចុច Enter ក៏បាន)
          if (e.target.value.length === 4) {
            setTimeout(submitTopup, 150);
          }
        });

        document.getElementById("inputPin").addEventListener("keyup", (e) => {
          if (e.key === "Enter" && e.target.value.length === 4) submitTopup();
        });
      }

      // ==========================================
      // ៣. ប្រវត្តិប្រតិបត្តិការ & Slip
      // ==========================================
      function openHistorySheet(accNum) {
        document.getElementById("sheetOverlay").classList.add("active");
        document.getElementById("historySheet").classList.add("active");

        const container = document.getElementById("historyListContainer");

        // ទាញយកប្រវត្តិ (បំប្លែងទៅជា String ដើម្បីប្រាកដថាការប្រៀបធៀបត្រឹមត្រូវ)
        const trxs = (currentUser.transactions || []).filter(
          (t) =>
            String(t.receiverAccount) === String(accNum) ||
            String(t.senderAccount) === String(accNum),
        );

        if (trxs.length === 0) {
          container.innerHTML = `<p style="text-align:center; padding:20px; color:#94a3b8;">មិនទាន់មានប្រវត្តិទេ</p>`;
          return;
        }

        let html = "";
        trxs.forEach((t) => {
          const isIncome = String(t.receiverAccount) === String(accNum); // បើកុងកូនជាអ្នកទទួល គឺបូកចូល
          const amtColor = isIncome ? "amt-in" : "amt-out";
          const symbol = isIncome ? "+" : "-";
          const icon = isIncome ? "fa-arrow-down" : "fa-arrow-up";

          html += `
            <div class="trx-item" onclick="openSlip('${t.transactionId || "12345"}', '${t.amount}', '${t.currency}', '${t.date}', '${t.remark}')">
              <div class="trx-left">
                <div class="trx-icon"><i class="fa-solid ${icon}"></i></div>
                <div>
                  <div class="trx-title">${t.remark || "Transfer"}</div>
                  <div class="trx-date">${t.date || "Today"}</div>
                </div>
              </div>
              <div class="trx-amt ${amtColor}">${symbol}${t.currency === "USD" ? "$" : ""}${t.amount}${t.currency === "KHR" ? " ៛" : ""}</div>
            </div>
          `;
        });
        container.innerHTML = html;
      }

      function openSlip(id, amount, cur, date, remark) {
        document.getElementById("historySheet").classList.remove("active"); // បិទ History សិន
        document.getElementById("slipSheet").classList.add("active"); // បើក Slip ពីលើ

        document.getElementById("slipAmount").innerText =
          `${cur === "USD" ? "$" : ""}${amount}${cur === "KHR" ? " ៛" : ""}`;
        document.getElementById("slipDate").innerText =
          date || new Date().toLocaleDateString();
        document.getElementById("slipType").innerText =
          remark || "Junior Transfer";
      }

      function closeSlipSheet() {
        document.getElementById("slipSheet").classList.remove("active");
        document.getElementById("sheetOverlay").classList.remove("active");
      }

      function developmentAlert() {
        Swal.fire({
          toast: true,
          position: "top",
          icon: "info",
          title: "កំពុងអភិវឌ្ឍន៍ (រង់ចាំ Backend)",
          showConfirmButton: false,
          timer: 2000,
        });
      }
    </script>
  </body>
</html>
