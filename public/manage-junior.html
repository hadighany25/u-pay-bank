<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>គ្រប់គ្រងគណនីកូន - U-Pay</title>
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kantumruy+Pro:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Icons & Alert -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      :root {
        --primary: #004d40;
        --primary-light: #e0f2f1;
        --bg-color: #f8fafc;
        --card-bg: #ffffff;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --danger: #e11d48;
        --warning: #f59e0b;
        --success: #10b981;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Inter", "Kantumruy Pro", sans-serif;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        padding-bottom: 30px;
      }

      /* Header */
      .header {
        background: var(--primary);
        color: white;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }
      .header i {
        font-size: 1.2rem;
        cursor: pointer;
      }
      .header h2 {
        font-size: 1.2rem;
        font-weight: 600;
      }

      /* Main Container */
      .container {
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
      }

      /* Add Button */
      .add-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        background: var(--primary-light);
        color: var(--primary);
        border: 2px dashed var(--primary);
        padding: 15px;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 25px;
        transition: all 0.2s;
      }
      .add-btn:active {
        transform: scale(0.98);
        background: #b2dfdb;
      }

      /* Junior Card */
      .junior-card {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
        position: relative;
        overflow: hidden;
      }

      .status-badge {
        position: absolute;
        top: 15px;
        right: 15px;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .status-active {
        background: #dcfce7;
        color: var(--success);
      }
      .status-frozen {
        background: #fee2e2;
        color: var(--danger);
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 15px;
      }
      .profile-icon {
        width: 50px;
        height: 50px;
        background: #fce7f3;
        color: #db2777;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
      }
      .kid-info h3 {
        font-size: 1.1rem;
        margin-bottom: 4px;
      }
      .kid-info p {
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      .balance-box {
        background: var(--bg-color);
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .bal-amount {
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--primary);
      }

      /* Action Grid */
      .action-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .action-btn {
        background: none;
        border: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        color: var(--text-muted);
      }
      .action-btn .icon-bg {
        width: 45px;
        height: 45px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        transition: 0.2s;
      }
      .action-btn span {
        font-size: 0.75rem;
        font-weight: 500;
      }

      .btn-topup .icon-bg {
        background: #ecfdf5;
        color: #10b981;
      }
      .btn-history .icon-bg {
        background: #eff6ff;
        color: #3b82f6;
      }
      .btn-limit .icon-bg {
        background: #fffbeb;
        color: #f59e0b;
      }
      .btn-freeze .icon-bg {
        background: #fef2f2;
        color: #ef4444;
      }

      .action-btn:active .icon-bg {
        transform: scale(0.9);
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <i
        class="fa-solid fa-arrow-left"
        onclick="window.location.href = 'dashboard.html'"
      ></i>
      <h2>គ្រប់គ្រងគណនីកូន (Manage Kids)</h2>
    </div>

    <!-- Main Content -->
    <div class="container">
      <!-- Add Kid Button -->
      <button
        class="add-btn"
        onclick="window.location.href = 'new-account.html'"
      >
        <i class="fa-solid fa-plus"></i> បង្កើតគណនីកូនថ្មី
      </button>

      <!-- Container សម្រាប់បង្ហាញកាតកូនៗ -->
      <div id="juniorCardsContainer">
        <!-- ទិន្នន័យនឹងត្រូវ Render ចេញពី JavaScript -->
      </div>
    </div>

    <script>
      let currentUser = null;

      // ពេលបើកផេកភ្លាម ទាញទិន្នន័យ User
      document.addEventListener("DOMContentLoaded", () => {
        const userData =
          sessionStorage.getItem("user") || localStorage.getItem("user");
        if (!userData) {
          window.location.href = "index.html";
          return;
        }
        currentUser = JSON.parse(userData);
        renderJuniorCards();
      });

      // មុខងារគូរ UI កាតរបស់កូនៗ
      function renderJuniorCards() {
        const container = document.getElementById("juniorCardsContainer");

        // ចម្រាញ់យកតែ SubAccounts ណាដែលជាកូន (junior)
        const juniorAccounts = (currentUser.subAccounts || []).filter(
          (acc) => acc.accountType === "junior",
        );

        if (juniorAccounts.length === 0) {
          container.innerHTML = `
            <div style="text-align: center; padding: 40px 20px; color: #64748b;">
              <i class="fa-solid fa-children" style="font-size: 3rem; color: #cbd5e1; margin-bottom: 15px;"></i>
              <p>អ្នកមិនទាន់មានគណនីកូននៅឡើយទេ!</p>
            </div>
          `;
          return;
        }

        let html = "";
        juniorAccounts.forEach((acc) => {
          // ត្រួតពិនិត្យថាគណនីហ្នឹង Frozen ឫអត់ (សម្រាប់ UI)
          const isFrozen = acc.isLocked || false;
          const statusClass = isFrozen ? "status-frozen" : "status-active";
          const statusText = isFrozen ? "🔒 បានផ្អាក" : "🟢 សកម្ម";
          const freezeIcon = isFrozen ? "fa-unlock" : "fa-lock";
          const freezeText = isFrozen ? "បើកសោរ" : "ផ្អាក";

          html += `
            <div class="junior-card">
              <div class="status-badge ${statusClass}">${statusText}</div>
              
              <div class="card-header">
                <div class="profile-icon">
                  <i class="fa-solid fa-child-reaching"></i>
                </div>
                <div class="kid-info">
                  <h3>${acc.accountName}</h3>
                  <p>Acc: ${acc.accountNumber}</p>
                </div>
              </div>

              <div class="balance-box">
                <span style="color: var(--text-muted); font-size: 0.9rem;">សមតុល្យបច្ចុប្បន្ន</span>
                <span class="bal-amount">$${Number(acc.balance).toFixed(2)}</span>
              </div>

              <div class="action-grid">
                <button class="action-btn btn-topup" onclick="topUpJunior('${acc.accountNumber}', '${acc.accountName}')">
                  <div class="icon-bg"><i class="fa-solid fa-hand-holding-dollar"></i></div>
                  <span>បញ្ចូលប្រាក់</span>
                </button>

                <button class="action-btn btn-history" onclick="viewHistory('${acc.accountNumber}')">
                  <div class="icon-bg"><i class="fa-solid fa-clock-rotate-left"></i></div>
                  <span>ប្រវត្តិ</span>
                </button>

                <button class="action-btn btn-limit" onclick="setDailyLimit('${acc.accountNumber}')">
                  <div class="icon-bg"><i class="fa-solid fa-sliders"></i></div>
                  <span>កំណត់លុយ</span>
                </button>

                <button class="action-btn btn-freeze" onclick="toggleFreeze('${acc.accountNumber}', ${isFrozen})">
                  <div class="icon-bg"><i class="fa-solid ${freezeIcon}"></i></div>
                  <span>${freezeText}</span>
                </button>
              </div>
            </div>
          `;
        });

        container.innerHTML = html;
      }

      // ==========================================
      // មុខងារស្នូល (Core Functions)
      // ==========================================

      // ១. បញ្ចូលប្រាក់ (Quick Top Up)
      function topUpJunior(accNum, name) {
        Swal.fire({
          title: `បញ្ចូលប្រាក់ឱ្យ ${name}`,
          html: `
            <input type="number" id="amt" class="swal2-input" placeholder="ចំនួនទឹកប្រាក់ (USD)">
            <input type="password" id="pin" class="swal2-input" placeholder="លេខសម្ងាត់ PIN របស់អ្នក" maxlength="4">
          `,
          confirmButtonText: "ផ្ទេរឥឡូវនេះ",
          confirmButtonColor: "#10b981",
          showCancelButton: true,
          cancelButtonText: "បោះបង់",
          preConfirm: () => {
            const amt = document.getElementById("amt").value;
            const pin = document.getElementById("pin").value;
            if (!amt || !pin)
              Swal.showValidationMessage("សូមបំពេញចំនួនលុយ និង PIN!");
            return { amt, pin };
          },
        }).then((result) => {
          if (result.isConfirmed) {
            Swal.fire({
              title: "កំពុងដំណើរការ...",
              didOpen: () => Swal.showLoading(),
            });
            // បាញ់ API ទៅកាន់ Route Transfer របស់យើង
            const reqBody = {
              senderUsername: currentUser.username,
              senderAccount: currentUser.accountNumber, // កាត់ពីកុងមេ
              receiverAccount: accNum,
              amount: result.value.amt,
              remark: "ប៉ាម៉ាក់បញ្ចូលលុយឱ្យអូន",
              pin: result.value.pin,
              currency: "USD",
            };

            fetch("/api/transaction/transfer", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${localStorage.getItem("token")}`,
              },
              body: JSON.stringify(reqBody),
            })
              .then((res) => res.json())
              .then((data) => {
                if (data.success) {
                  Swal.fire(
                    "ជោគជ័យ!",
                    "លុយបានផ្ទេរចូលគណនីកូនរួចរាល់",
                    "success",
                  ).then(() => {
                    window.location.reload(); // Refresh យកលុយថ្មី
                  });
                } else {
                  Swal.fire("បរាជ័យ", data.message, "error");
                }
              })
              .catch(() => Swal.fire("Error", "បញ្ហាភ្ជាប់ទៅ Server", "error"));
          }
        });
      }

      // ២. មើលប្រវត្តិ (View History) - នាំទៅផ្ទាំង Statement
      function viewHistory(accNum) {
        // បញ្ជូនលេខកុងកូនទៅផ្ទាំង History (បងអាចតកូដទៅផ្ទាំង History ដែលមានស្រាប់)
        sessionStorage.setItem("viewAccountHistory", accNum);
        window.location.href = "statement.html";
      }

      // ៣. កំណត់រនាំងចំណាយ (Set Daily Limit) - UI រួចរាល់ រង់ចាំ Backend
      function setDailyLimit(accNum) {
        Swal.fire({
          title: "កំណត់រនាំងចំណាយប្រចាំថ្ងៃ",
          html: `
            <p style="font-size:0.9rem; color:#64748b; margin-bottom:10px;">កំណត់ថាកូនអាចចាយបានប៉ុន្មានក្នុង ១ថ្ងៃ</p>
            <input type="number" id="limit" class="swal2-input" placeholder="ឧទាហរណ៍: 5 (USD)">
            <input type="password" id="limitPin" class="swal2-input" placeholder="លេខសម្ងាត់ PIN របស់អ្នក">
          `,
          confirmButtonText: "រក្សាទុក",
          confirmButtonColor: "#f59e0b",
          showCancelButton: true,
        }).then((result) => {
          if (result.isConfirmed) {
            Swal.fire(
              "កំពុងអភិវឌ្ឍន៍",
              "មុខងារកំណត់លុយនឹងដំណើរការឆាប់ៗ (រង់ចាំអាប់ដេត Backend)!",
              "info",
            );
            // TODO: បាញ់ API ទៅ Backend ដើម្បី Update ទិន្នន័យ User កូន (trxLimit)
          }
        });
      }

      // ៤. ផ្អាកគណនី (Freeze/Unfreeze) - UI រួចរាល់ រង់ចាំ Backend
      function toggleFreeze(accNum, currentFrozenStatus) {
        const actionText = currentFrozenStatus ? "បើកសោរ" : "ផ្អាក";
        const confirmColor = currentFrozenStatus ? "#10b981" : "#ef4444";

        Swal.fire({
          title: `តើអ្នកពិតជាចង់ ${actionText} គណនីនេះមែនទេ?`,
          html: `<input type="password" id="freezePin" class="swal2-input" placeholder="បញ្ជាក់ PIN របស់អ្នក">`,
          icon: "warning",
          showCancelButton: true,
          confirmButtonText: `យល់ព្រម ${actionText}`,
          confirmButtonColor: confirmColor,
        }).then((result) => {
          if (result.isConfirmed) {
            Swal.fire(
              "កំពុងអភិវឌ្ឍន៍",
              "មុខងារផ្អាកគណនីនឹងដំណើរការឆាប់ៗ (រង់ចាំអាប់ដេត Backend)!",
              "info",
            );
            // TODO: បាញ់ API ទៅ Backend ដើម្បី Update កូន (isFrozen = true/false)
          }
        });
      }
    </script>
  </body>
</html>
