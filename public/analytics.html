<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <title>Analytics - U-Pay</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kantumruy+Pro:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/lang.js"></script>
    <script src="js/u-pay-core.js"></script>
    <script src="js/toast.js"></script>

    <style>
      :root {
        --primary: #004d40;
        --secondary: #10b981;
        --bg-color: #f2f4f6;
        --card-bg: #ffffff;
        --text-dark: #1e293b;
        --text-light: #64748b;
        --border-color: #f1f5f9;
        --danger: #ef4444;
        --warning: #f59e0b;
        --info: #3b82f6;
      }

      body {
        background-color: var(--bg-color);
        margin: 0;
        font-family: "Inter", "Kantumruy Pro", sans-serif;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      .app-container {
        width: 100%;
        max-width: 450px;
        background: var(--bg-color);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        padding-bottom: 90px;
        position: relative;
      }

      /* Animations */
      .animate-fade-up {
        animation: fadeInUp 0.5s ease-out forwards;
        opacity: 0;
      }
      .animate-zoom-in {
        animation: zoomIn 0.4s ease-out forwards;
        opacity: 0;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes zoomIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .nav-header {
        padding: 20px;
        background: var(--primary);
        color: white;
        display: flex;
        align-items: center;
        gap: 15px;
        font-size: 1.15rem;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(0, 77, 64, 0.1);
      }
      .nav-header a {
        color: white;
        text-decoration: none;
      }

      .content-body {
        padding: 20px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      /* CHART CARD */
      .chart-card {
        background: var(--card-bg);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.04);
        margin-bottom: 25px;
        border: 1px solid var(--border-color);
      }
      .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }
      .chart-title {
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--text-dark);
        margin: 0;
      }

      /* FILTER SELECT STYLING */
      .filter-select {
        background: #f8fafc;
        border: 1px solid var(--border-color);
        padding: 6px 10px;
        border-radius: 10px;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--primary);
        outline: none;
        cursor: pointer;
        font-family: inherit;
      }

      .chart-container {
        position: relative;
        height: 200px;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .total-expense-display {
        text-align: center;
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px dashed var(--border-color);
      }
      .total-expense-display p {
        margin: 0 0 5px;
        font-size: 0.8rem;
        color: var(--text-light);
        font-weight: 600;
        text-transform: uppercase;
      }
      .total-expense-display h2 {
        margin: 0;
        color: var(--danger);
        font-size: 1.8rem;
        font-weight: 800;
      }

      /* LIST SECTION */
      .list-header {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-dark);
        margin: 10px 0 15px;
      }
      .expense-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .expense-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--card-bg);
        padding: 15px;
        border-radius: 16px;
        border: 1px solid var(--border-color);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
      }
      .expense-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .expense-icon {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
      }
      .expense-icon.bills {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger);
      }
      .expense-icon.transfers {
        background: rgba(245, 158, 11, 0.1);
        color: var(--warning);
      }
      .expense-icon.merchant {
        background: rgba(59, 130, 246, 0.1);
        color: var(--info);
      }

      .expense-info h4 {
        margin: 0 0 2px;
        font-size: 0.9rem;
        color: var(--text-dark);
        font-weight: 700;
      }
      .expense-info p {
        margin: 0;
        font-size: 0.75rem;
        color: var(--text-light);
      }
      .expense-amount {
        font-weight: 800;
        color: var(--text-dark);
        font-size: 0.95rem;
      }

      /* BOTTOM NAV */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 450px;
        display: flex;
        background: var(--card-bg);
        padding: 12px 0 15px 0;
        justify-content: space-around;
        box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.05);
        z-index: 9999;
        border-radius: 20px 20px 0 0;
      }
      .nav-item {
        text-align: center;
        color: var(--text-light);
        font-size: 0.75rem;
        text-decoration: none;
        flex: 1;
      }
      .nav-item i {
        font-size: 1.3rem;
        display: block;
        margin-bottom: 4px;
      }
      .nav-item.active {
        color: var(--primary);
        font-weight: 700;
      }

      /* DARK MODE */
      body.dark-mode {
        background-color: #0f172a !important;
        color: #f8fafc !important;
      }
      body.dark-mode .app-container {
        background-color: #0f172a !important;
      }
      body.dark-mode .chart-card,
      body.dark-mode .expense-item,
      body.dark-mode .bottom-nav {
        background-color: #1e293b !important;
        border-color: #334155 !important;
      }
      body.dark-mode .chart-title,
      body.dark-mode .expense-info h4,
      body.dark-mode .expense-amount,
      body.dark-mode .list-header {
        color: #f8fafc !important;
      }
      body.dark-mode .filter-select {
        background: #0f172a;
        color: white;
        border-color: #334155;
      }
      body.dark-mode .total-expense-display,
      body.dark-mode .bottom-nav {
        border-color: #334155 !important;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div class="nav-header">
        <a href="dashboard.html"><i class="fa-solid fa-arrow-left"></i></a>
        <span data-lang="title_analytics">Analytics</span>
      </div>

      <div class="content-body">
        <div class="chart-card animate-zoom-in">
          <div class="chart-header">
            <h3 class="chart-title" data-lang="monthly_expenses">
              Monthly Expenses
            </h3>
            <select
              class="filter-select"
              id="timeFilter"
              onchange="fetchAndLoadAnalytics()"
            >
              <option value="today" data-lang="filter_today">Today</option>
              <option value="month" selected data-lang="filter_month">
                This Month
              </option>
              <option value="year" data-lang="filter_year">This Year</option>
            </select>
          </div>

          <div class="chart-container">
            <canvas id="expenseChart"></canvas>
          </div>

          <div class="total-expense-display">
            <p data-lang="total_spent">Total Spent</p>
            <h2>$<span id="totalSpent">0.00</span></h2>
          </div>
        </div>

        <h3
          class="list-header animate-fade-up"
          style="animation-delay: 0.1s"
          data-lang="expense_breakdown"
        >
          Expense Breakdown
        </h3>

        <div class="expense-list">
          <div
            class="expense-item animate-fade-up"
            style="animation-delay: 0.2s"
          >
            <div class="expense-left">
              <div class="expense-icon bills">
                <i class="fa-solid fa-file-invoice-dollar"></i>
              </div>
              <div class="expense-info">
                <h4 id="lblBills" data-lang="cat_bills">Bills & Utilities</h4>
                <p id="billsCount">0 transactions</p>
              </div>
            </div>
            <div class="expense-amount" id="billsTotalAmt">$0.00</div>
          </div>

          <div
            class="expense-item animate-fade-up"
            style="animation-delay: 0.3s"
          >
            <div class="expense-left">
              <div class="expense-icon transfers">
                <i class="fa-solid fa-paper-plane"></i>
              </div>
              <div class="expense-info">
                <h4 id="lblTransfers" data-lang="cat_transfers">Transfers</h4>
                <p id="transfersCount">0 transactions</p>
              </div>
            </div>
            <div class="expense-amount" id="transfersTotalAmt">$0.00</div>
          </div>

          <div
            class="expense-item animate-fade-up"
            style="animation-delay: 0.4s"
          >
            <div class="expense-left">
              <div class="expense-icon merchant">
                <i class="fa-solid fa-store"></i>
              </div>
              <div class="expense-info">
                <h4 id="lblMerchant" data-lang="cat_merchant">
                  Merchant Payment
                </h4>
                <p id="merchantCount">0 transactions</p>
              </div>
            </div>
            <div class="expense-amount" id="merchantTotalAmt">$0.00</div>
          </div>
        </div>
      </div>

      <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item"
          ><i class="fa-solid fa-house"></i
          ><span data-lang="nav_home">Home</span></a
        >
        <a href="scan.html" class="nav-item"
          ><i class="fa-solid fa-qrcode"></i
          ><span data-lang="nav_scan">Scan</span></a
        >
        <a href="history.html" class="nav-item"
          ><i class="fa-solid fa-clock-rotate-left"></i
          ><span data-lang="nav_history">History</span></a
        >
        <a href="settings.html" class="nav-item"
          ><i class="fa-solid fa-gear"></i
          ><span data-lang="nav_settings">Settings</span></a
        >
      </div>
    </div>

    <script>
      let user = JSON.parse(sessionStorage.getItem("user"));
      let token = sessionStorage.getItem("userToken");
      if (!user || !token) window.location.href = "index.html";

      const authHeaders = {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`,
      };
      let expenseChart = null;

      function applyTheme() {
        const userThemeKey = "darkMode_" + user.username;
        const isDark =
          localStorage.getItem("theme") === "dark" ||
          localStorage.getItem(userThemeKey) === "true";
        if (isDark) document.body.classList.add("dark-mode");
        else document.body.classList.remove("dark-mode");
      }

      window.addEventListener("DOMContentLoaded", () => {
        applyTheme();
        if (typeof applyLanguage === "function") applyLanguage();
        fetchAndLoadAnalytics();
      });

      function parseDateString(dateStr) {
        if (!dateStr) return new Date();
        let d = new Date(dateStr);
        if (isNaN(d.getTime()) && dateStr.includes(","))
          d = new Date(dateStr.split(",")[0].trim());
        return isNaN(d.getTime()) ? new Date() : d;
      }

      async function fetchAndLoadAnalytics() {
        try {
          const res = await fetch("/api/users", { headers: authHeaders });
          if (res.ok) {
            const users = await res.json();
            const serverUser = users.find((u) => u.username === user.username);
            if (serverUser) {
              user.transactions = serverUser.transactions || [];
              sessionStorage.setItem("user", JSON.stringify(user));
            }
          }
        } catch (e) {
          console.error("Sync error:", e);
        }
        renderAnalytics(user.transactions || []);
      }

      function animateValue(obj, start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
          if (!startTimestamp) startTimestamp = timestamp;
          const progress = Math.min((timestamp - startTimestamp) / duration, 1);
          obj.innerHTML = (progress * (end - start) + start).toFixed(2);
          if (progress < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
      }

      function renderAnalytics(transactions) {
        const now = new Date();
        const filter = document.getElementById("timeFilter").value;

        let billsTotal = 0,
          billsCount = 0;
        let transfersTotal = 0,
          transfersCount = 0;
        let merchantTotal = 0,
          merchantCount = 0;

        transactions.forEach((t) => {
          let amt = parseFloat(t.amount) || 0;
          if (amt < 0) {
            const tDate = parseDateString(t.date || t.createdAt);
            let match = false;

            if (filter === "today") {
              match = tDate.toDateString() === now.toDateString();
            } else if (filter === "month") {
              match =
                tDate.getMonth() === now.getMonth() &&
                tDate.getFullYear() === now.getFullYear();
            } else if (filter === "year") {
              match = tDate.getFullYear() === now.getFullYear();
            }

            if (match) {
              let typeStr = (t.type || t.trxMethod || "").toLowerCase();
              if (typeStr.includes("bill") || typeStr.includes("utility")) {
                billsTotal += Math.abs(amt);
                billsCount++;
              } else if (
                typeStr.includes("merchant") ||
                typeStr.includes("scan") ||
                typeStr.includes("qr")
              ) {
                merchantTotal += Math.abs(amt);
                merchantCount++;
              } else {
                transfersTotal += Math.abs(amt);
                transfersCount++;
              }
            }
          }
        });

        const totalExpense = billsTotal + transfersTotal + merchantTotal;
        const totalSpan = document.getElementById("totalSpent");
        animateValue(totalSpan, 0, totalExpense, 1000);

        const lang = localStorage.getItem("lang") || "en";
        let trxWord = lang === "kh" ? "ប្រតិបត្តិការ" : "transactions";

        document.getElementById("billsCount").innerText =
          `${billsCount} ${trxWord}`;
        document.getElementById("billsTotalAmt").innerText =
          `$${billsTotal.toFixed(2)}`;
        document.getElementById("transfersCount").innerText =
          `${transfersCount} ${trxWord}`;
        document.getElementById("transfersTotalAmt").innerText =
          `$${transfersTotal.toFixed(2)}`;
        document.getElementById("merchantCount").innerText =
          `${merchantCount} ${trxWord}`;
        document.getElementById("merchantTotalAmt").innerText =
          `$${merchantTotal.toFixed(2)}`;

        const ctx = document.getElementById("expenseChart").getContext("2d");
        const isDark = document.body.classList.contains("dark-mode");

        Chart.defaults.color = isDark ? "#94a3b8" : "#64748b";
        Chart.defaults.font.family = "'Inter', 'Kantumruy Pro', sans-serif";

        if (expenseChart) expenseChart.destroy();

        let lblBills = document.getElementById("lblBills").innerText;
        let lblTransfers = document.getElementById("lblTransfers").innerText;
        let lblMerchant = document.getElementById("lblMerchant").innerText;
        let noDataTxt = lang === "kh" ? "មិនមានទិន្នន័យ" : "No Data";

        const dataValues =
          totalExpense === 0
            ? [1]
            : [billsTotal, transfersTotal, merchantTotal];
        const bgColors =
          totalExpense === 0
            ? [isDark ? "#334155" : "#e2e8f0"]
            : ["#ef4444", "#f59e0b", "#3b82f6"];

        expenseChart = new Chart(ctx, {
          type: "doughnut",
          data: {
            labels:
              totalExpense === 0
                ? [noDataTxt]
                : [lblBills, lblTransfers, lblMerchant],
            datasets: [
              {
                data: dataValues,
                backgroundColor: bgColors,
                borderWidth: totalExpense === 0 ? 0 : 4,
                borderColor: isDark ? "#1e293b" : "#ffffff",
                hoverOffset: totalExpense === 0 ? 0 : 8,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: "75%",
            animation: {
              animateScale: true,
              animateRotate: true,
              duration: 1000,
            },
            plugins: {
              legend: {
                display: totalExpense !== 0,
                position: "right",
                labels: {
                  usePointStyle: true,
                  boxWidth: 10,
                  padding: 15,
                  font: { weight: "600" },
                },
              },
              tooltip: { enabled: totalExpense !== 0 },
            },
          },
        });
      }
    </script>
  </body>
</html>
