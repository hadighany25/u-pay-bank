<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <title>Analytics - U-Pay</title>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Kantumruy+Pro:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- External Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/lang.js"></script>
    <script src="js/u-pay-core.js"></script>
    <script src="js/toast.js"></script>

    <style>
      :root {
        --primary: #004d40;
        --secondary: #10b981;
        --bg-color: #f2f4f6;
        --card-bg: #ffffff;
        --text-dark: #1e293b;
        --text-light: #64748b;
        --border-color: #f1f5f9;
        --danger: #ef4444;
        --warning: #f59e0b;
      }

      body {
        background-color: var(--bg-color);
        margin: 0;
        font-family: "Inter", "Kantumruy Pro", sans-serif;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      .app-container {
        width: 100%;
        max-width: 450px;
        background: var(--bg-color);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        transition: background-color 0.3s ease;
        padding-bottom: 90px;
      }

      /* Animations */
      .animate-fade-up {
        animation: fadeInUp 0.5s ease-out forwards;
        opacity: 0;
      }
      .animate-zoom-in {
        animation: zoomIn 0.4s ease-out forwards;
        opacity: 0;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes zoomIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .nav-header {
        padding: 20px;
        background: var(--primary);
        color: white;
        display: flex;
        align-items: center;
        gap: 15px;
        font-size: 1.15rem;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(0, 77, 64, 0.1);
        z-index: 10;
      }
      .nav-header a {
        color: white;
        text-decoration: none;
        transition: transform 0.2s;
      }
      .nav-header a:active {
        transform: scale(0.9);
      }

      .content-body {
        padding: 20px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      /* CHART CARD */
      .chart-card {
        background: var(--card-bg);
        border-radius: 20px;
        padding: 25px 20px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.04);
        margin-bottom: 25px;
        border: 1px solid var(--border-color);
        transition:
          background-color 0.3s ease,
          border-color 0.3s ease;
      }
      .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .chart-title {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text-dark);
        margin: 0;
      }
      .month-badge {
        background: rgba(16, 185, 129, 0.1);
        color: var(--secondary);
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 700;
      }

      .chart-container {
        position: relative;
        height: 220px;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #noDataMsg {
        text-align: center;
        color: var(--text-light);
        font-size: 0.95rem;
        font-weight: 500;
      }

      .total-expense-display {
        text-align: center;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px dashed var(--border-color);
      }
      .total-expense-display p {
        margin: 0 0 5px;
        font-size: 0.85rem;
        color: var(--text-light);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .total-expense-display h2 {
        margin: 0;
        color: var(--danger);
        font-size: 2rem;
        font-weight: 800;
        font-family: "Inter", sans-serif;
      }

      /* LIST SECTION */
      .list-header {
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--text-dark);
        margin: 10px 0 15px;
      }
      .expense-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .expense-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--card-bg);
        padding: 16px;
        border-radius: 16px;
        border: 1px solid var(--border-color);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        transition:
          transform 0.2s,
          background-color 0.3s;
        cursor: pointer;
      }
      .expense-item:hover {
        transform: translateY(-2px);
      }

      .expense-left {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .expense-icon {
        width: 45px;
        height: 45px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
      }
      .expense-icon.bills {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger);
      }
      .expense-icon.transfers {
        background: rgba(245, 158, 11, 0.1);
        color: var(--warning);
      }

      .expense-info h4 {
        margin: 0 0 4px;
        font-size: 0.95rem;
        color: var(--text-dark);
        font-weight: 700;
      }
      .expense-info p {
        margin: 0;
        font-size: 0.8rem;
        color: var(--text-light);
        font-weight: 500;
      }
      .expense-amount {
        font-weight: 800;
        color: var(--text-dark);
        font-size: 1.05rem;
        font-family: "Inter", sans-serif;
      }

      /* BOTTOM NAV */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 450px;
        display: flex;
        background: var(--card-bg);
        padding: 12px 0 15px 0;
        justify-content: space-around;
        box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.05);
        z-index: 9999;
        border-radius: 20px 20px 0 0;
        border-top: 1px solid var(--border-color);
        transition: background-color 0.3s ease;
      }
      .nav-item {
        text-align: center;
        color: var(--text-light);
        font-size: 0.75rem;
        text-decoration: none;
        cursor: pointer;
        transition: 0.2s;
        flex: 1;
        font-weight: 600;
      }
      .nav-item i {
        font-size: 1.4rem;
        display: block;
        margin-bottom: 5px;
      }
      .nav-item:active {
        transform: scale(0.9);
      }
      .nav-item.active {
        color: var(--primary);
        transform: translateY(-3px);
      }

      /* ==================================
         DARK MODE PROFESSIONAL
         ================================== */
      body.dark-mode {
        background-color: #0f172a !important;
        color: #f8fafc !important;
      }
      body.dark-mode .app-container {
        background-color: #0f172a !important;
      }
      body.dark-mode .nav-header {
        background-color: #1e293b !important;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      body.dark-mode .chart-card,
      body.dark-mode .expense-item,
      body.dark-mode .bottom-nav {
        background-color: #1e293b !important;
        border-color: #334155 !important;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1) !important;
      }

      body.dark-mode .chart-title,
      body.dark-mode .expense-info h4,
      body.dark-mode .expense-amount,
      body.dark-mode .list-header {
        color: #f8fafc !important;
      }

      body.dark-mode .total-expense-display,
      body.dark-mode .bottom-nav {
        border-color: #334155 !important;
      }

      body.dark-mode .expense-info p,
      body.dark-mode #noDataMsg,
      body.dark-mode .total-expense-display p,
      body.dark-mode .nav-item {
        color: #94a3b8 !important;
      }

      body.dark-mode .month-badge {
        background-color: rgba(16, 185, 129, 0.15) !important;
      }
      body.dark-mode .nav-item.active {
        color: var(--secondary) !important;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div class="nav-header">
        <a href="dashboard.html"><i class="fa-solid fa-arrow-left"></i></a>
        <span data-i18n="title_analytics">Analytics</span>
      </div>

      <div class="content-body">
        <div class="chart-card animate-zoom-in">
          <div class="chart-header">
            <h3 class="chart-title" data-i18n="monthly_expenses">
              Monthly Expenses
            </h3>
            <div class="month-badge" id="monthBadge">This Month</div>
          </div>

          <div class="chart-container">
            <canvas id="expenseChart"></canvas>
            <div id="noDataMsg" style="display: none" data-i18n="no_expenses">
              No expenses recorded this month.
            </div>
          </div>

          <div class="total-expense-display">
            <p data-i18n="total_spent">Total Spent</p>
            <h2>$<span id="totalSpent">0.00</span></h2>
          </div>
        </div>

        <h3
          class="list-header animate-fade-up"
          style="animation-delay: 0.1s"
          data-i18n="expense_breakdown"
        >
          Expense Breakdown
        </h3>

        <div class="expense-list">
          <div
            class="expense-item animate-fade-up"
            style="animation-delay: 0.2s"
          >
            <div class="expense-left">
              <div class="expense-icon bills">
                <i class="fa-solid fa-file-invoice-dollar"></i>
              </div>
              <div class="expense-info">
                <h4 id="lblBills" data-i18n="cat_bills">Bills & Utilities</h4>
                <p id="billsCount">0 transactions</p>
              </div>
            </div>
            <div class="expense-amount" id="billsTotalAmt">$0.00</div>
          </div>

          <div
            class="expense-item animate-fade-up"
            style="animation-delay: 0.3s"
          >
            <div class="expense-left">
              <div class="expense-icon transfers">
                <i class="fa-solid fa-paper-plane"></i>
              </div>
              <div class="expense-info">
                <h4 id="lblTransfers" data-i18n="cat_transfers">Transfers</h4>
                <p id="transfersCount">0 transactions</p>
              </div>
            </div>
            <div class="expense-amount" id="transfersTotalAmt">$0.00</div>
          </div>
        </div>
      </div>

      <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
          <i class="fa-solid fa-house"></i>
          <span data-i18n="nav_home">Home</span>
        </a>
        <a href="scan.html" class="nav-item">
          <i class="fa-solid fa-qrcode"></i>
          <span data-i18n="nav_scan">Scan</span>
        </a>
        <a href="history.html" class="nav-item">
          <i class="fa-solid fa-clock-rotate-left"></i>
          <span data-i18n="nav_history">History</span>
        </a>
        <a href="settings.html" class="nav-item">
          <i class="fa-solid fa-gear"></i>
          <span data-i18n="nav_settings">Settings</span>
        </a>
      </div>
    </div>

    <script>
      // Session Validation
      let user = JSON.parse(sessionStorage.getItem("user"));
      let token = sessionStorage.getItem("userToken");
      if (!user || !token) window.location.href = "index.html";

      const authHeaders = window.authHeaders || {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`,
      };

      let expenseChart = null;

      // Theme Support Function
      function applyTheme() {
        const userThemeKey = "darkMode_" + user.username;
        const isDark =
          localStorage.getItem("theme") === "dark" ||
          localStorage.getItem(userThemeKey) === "true";
        if (isDark) document.body.classList.add("dark-mode");
        else document.body.classList.remove("dark-mode");
      }

      window.addEventListener("DOMContentLoaded", () => {
        applyTheme();
        if (typeof applyLanguage === "function") applyLanguage();
        setupMonthBadge();
        fetchAndLoadAnalytics();
      });

      function setupMonthBadge() {
        const d = new Date();
        const currentLang = localStorage.getItem("lang") || "en";
        const monthNames = [
          "Jan",
          "Feb",
          "Mar",
          "Apr",
          "May",
          "Jun",
          "Jul",
          "Aug",
          "Sep",
          "Oct",
          "Nov",
          "Dec",
        ];
        const monthNamesKh = [
          "មករា",
          "កុម្ភៈ",
          "មីនា",
          "មេសា",
          "ឧសភា",
          "មិថុនា",
          "កក្កដា",
          "សីហា",
          "កញ្ញា",
          "តុលា",
          "វិច្ឆិកា",
          "ធ្នូ",
        ];
        document.getElementById("monthBadge").innerText =
          currentLang === "kh"
            ? monthNamesKh[d.getMonth()]
            : monthNames[d.getMonth()];
      }

      function parseDateString(dateStr) {
        if (!dateStr) return new Date();
        let parsedDate = new Date(dateStr);
        if (isNaN(parsedDate.getTime()) && dateStr.includes(","))
          parsedDate = new Date(dateStr.split(",")[0].trim());
        return isNaN(parsedDate.getTime()) ? new Date() : parsedDate;
      }

      async function fetchAndLoadAnalytics() {
        try {
          const res = await fetch("/api/users", { headers: authHeaders });
          if (res.ok) {
            const users = await res.json();
            const serverUser = users.find((u) => u.username === user.username);
            if (serverUser) {
              user.transactions = serverUser.transactions || [];
              sessionStorage.setItem("user", JSON.stringify(user));
              renderAnalytics(user.transactions);
            }
          }
        } catch (err) {
          console.error("Sync Error:", err);
          renderAnalytics(user.transactions || []);
        }
      }

      function animateValue(obj, start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
          if (!startTimestamp) startTimestamp = timestamp;
          const progress = Math.min((timestamp - startTimestamp) / duration, 1);
          obj.innerHTML = (progress * (end - start) + start).toFixed(2);
          if (progress < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
      }

      function renderAnalytics(transactions) {
        const now = new Date();
        const currentMonth = now.getMonth();
        const currentYear = now.getFullYear();

        let billsTotal = 0;
        let billsCount = 0;
        let transfersTotal = 0;
        let transfersCount = 0;

        transactions.forEach((t) => {
          if (t.amount < 0 && (t.currency === "USD" || !t.currency)) {
            const tDate = parseDateString(t.date);
            if (
              tDate.getMonth() === currentMonth &&
              tDate.getFullYear() === currentYear
            ) {
              if (t.type === "Bill Payment") {
                billsTotal += Math.abs(t.amount);
                billsCount++;
              } else {
                transfersTotal += Math.abs(t.amount);
                transfersCount++;
              }
            }
          }
        });

        const totalExpense = billsTotal + transfersTotal;
        const totalSpan = document.getElementById("totalSpent");
        animateValue(totalSpan, 0, totalExpense, 1000);

        const currentLang = localStorage.getItem("lang") || "en";
        let trxWord = currentLang === "kh" ? "ប្រតិបត្តិការ" : "transactions";

        document.getElementById("billsCount").innerText =
          `${billsCount} ${trxWord}`;
        document.getElementById("billsTotalAmt").innerText =
          `$${billsTotal.toFixed(2)}`;
        document.getElementById("transfersCount").innerText =
          `${transfersCount} ${trxWord}`;
        document.getElementById("transfersTotalAmt").innerText =
          `$${transfersTotal.toFixed(2)}`;

        const ctx = document.getElementById("expenseChart").getContext("2d");
        const isDark = document.body.classList.contains("dark-mode");
        Chart.defaults.color = isDark ? "#94a3b8" : "#64748b";
        Chart.defaults.font.family = "'Inter', 'Kantumruy Pro', sans-serif";

        if (totalExpense === 0) {
          document.getElementById("expenseChart").style.display = "none";
          document.getElementById("noDataMsg").style.display = "block";
          return;
        } else {
          document.getElementById("expenseChart").style.display = "block";
          document.getElementById("noDataMsg").style.display = "none";
        }

        if (expenseChart) expenseChart.destroy();

        // Dynamically get translated labels rendered by lang.js
        let lblBillsText =
          document.getElementById("lblBills").innerText || "Bills & Utilities";
        let lblTransfersText =
          document.getElementById("lblTransfers").innerText || "Transfers";

        expenseChart = new Chart(ctx, {
          type: "doughnut",
          data: {
            labels: [lblBillsText, lblTransfersText],
            datasets: [
              {
                data: [billsTotal, transfersTotal],
                backgroundColor: ["#ef4444", "#f59e0b"],
                borderWidth: isDark ? 4 : 4,
                borderColor: isDark ? "#1e293b" : "#ffffff",
                hoverOffset: 8,
                borderRadius: 5,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: "75%",
            animation: {
              animateScale: true,
              animateRotate: true,
              duration: 1500,
              easing: "easeOutQuart",
            },
            plugins: {
              legend: {
                position: "right",
                labels: {
                  usePointStyle: true,
                  boxWidth: 10,
                  padding: 20,
                  font: { weight: "600" },
                },
              },
              tooltip: {
                backgroundColor: isDark ? "#0f172a" : "#1e293b",
                padding: 12,
                cornerRadius: 8,
                callbacks: {
                  label: function (context) {
                    return " $" + context.parsed.toFixed(2);
                  },
                },
              },
            },
          },
        });
      }
    </script>
  </body>
</html>
